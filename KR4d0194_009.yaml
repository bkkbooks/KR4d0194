body:
  text: 蘆川歸来集巻九宋張元幹撰序亦樂居士文集序文章名世自有淵源殆與天地元氣同流可以斡旋造化闗鍵顧在人所鍾禀及師授為如何譬猶一身五官百骸各随形模萬態不同至扵上下左右則難以倒置必也精神發揮迺中儀矩不然土木偶爾前輩嘗云詩句當法子美其他述作無出退之韓杜門庭風行水上自然成文俱名活法金聲玉振正如吾夫子集大成葢確論也國初儒宗楊劉數公㳂襲五代衰陋號西崑體未能超詣廬陵歐陽文忠公初得退之詩文扵漢東弊篋故書中愛其言辨意深已而官扵洛乃與尹師魯講習文風丕變寖近古矣未㡬丈安先生蘇明允起扵西蜀父子兄弟俱文忠公門下士東坡之門又得山谷檃栝詩律扵是少陵句法大振如張文潛晁無咎秦少㳺陳無已之流相望輩出世不乏才是豈無淵源而然耶故尚書户部侍郎豫章王公承可人品髙妙其文章深造少陵閫域一時聲名籍甚薦紳間惜乎天不假年位未稱徳善類䀌傷後六年公之第三子湑叔濟手裒先人平生所著總若干篇離為六巻名曰亦樂居士文集子職也叔濟賢而有文克世其家一日屬予序之将鏤板傳扵世予晩生雖不及見東坡山谷而少時在江西實從東湖徐公師川授以句法東湖山谷甥也貳卿視東湖里中丈人行也東湖昂藏嚴毅不妄許可集中多有贈答斯已可見然而今代鴻儒以文鳴要路能軒輊人者頗多叔濟不他求反取信扵退閒無聞之老何耶得非以皇祐中原本闕四字與先祖同年進士迨宣和初少師公帥廣陵予以年家孫展拜牀下復齒長貮卿三嵗輩行既同情義不啻手足景服言行之詳誠莫予若也叔濟用予蕪纇之語俾冠編帙獲託名不朽幸矣尚何敢辭貳卿在朝廷則獻納論思書扵史官在方鎮則撫綏智畧碑扵徳政固不待予言姑推其淵源所自来追古作者如此後之君子必有處之矣紹興二十四年九月晦日記福州連江縣潘渡石橋記閩中統八州之地重山複嶺綿亘聨屬而傍海城邑亦居其半大抵谿壑之交㑹潮汐之吐吞或匯為深淵或激為犇湍必曰蛟螭窟穴存焉設有舟楫乗險可虞惡少椎埋得以邀留行旅自夏徂秋颶母飄烈瞬息暴至固使人惴慄震掉一旦雷雨晦冥莫辨咫尺凡問津者皆病涉也皇朝嘉祐間莆陽蔡公君謨守温陵始作石橋萬安渡雄盛冠扵東南豐碑巋然大書深刻邦人至今祠之其墨本流傳常在人耳目自爾所至多取規橅然世間假修頭陁行之流往往藉此為姦利囊橐徒費嵗月迄無成功如連江潘渡本以姓著先是里人林道夫等權輿其事嵗在乙夘歴四載僅能鑿石庀材已而僧資逸輩嗣之既再朞㑹計所醵金共不滿二百萬皆廢扵索址随築屢毀沙水蕩潏漲落崩騰莫之禦也道夫資逸心志俱怠輒棄去又再朞矣前安撫使程進道適由永嘉移鎮此邦壬戌春二月也渡有候館公少休焉謂此渡實羅源寜徳長溪三邑塗所自出而車馬如浙東廣右者絡繹往来念當積潦之患與夫向所謂凡問津病涉者誠不可無橋以濟鋭意是舉召知縣事阮侯朝瑞俾經營之侯思慮精密善揣摩用鈎距畧不畀付胥徒隂擇所治號能住持僧數人者董其役又得淨安之思顯授以程度思顯堅忍通練出納惟謹而畏督責常踧踖救過不暇予竊怪侯乃能從容三尺之間獨仰衆人樂從有成如此不其難哉然則是非毁譽果可卜矣時當終更夤縁以書来求予為之記甚力予将何辭姑綴緝本末阮侯名珪朝瑞葢其字是亦莆陽人云題䟦題䟦了堂先生文集某愚且戇不學無術卒老扵行然少時有志從前輩長者遊擔簦竭蹶不捨晝夜宣和庚子春拜忠肅公扵廬山之南陪侍杖屨幽尋雲煙水石間者累月與聞前言往行商㩁古今治亂成敗夜分迺就寐先生嘗謂孺子可教賜以大父手澤題䟦曰為士而能尊其祖為子而能幹父之蠱此可久之習也辭采燦然足以有譽扵世矣某書紳佩服終身弗忘且刋之碑版永藏扵家貽訓子孫墨猶未乾也顧某何人乃獲先生知遇期待如此茲者又辱次對貳卿崇篤先契不鄙荒唐容許校讎了堂文集得非目前賢士大夫及識先生者所存無㡬耶扵是自夏涉秋手加審訂凡字畫之訛舛倫序之失次是非之去取分部巻帙各適其當具如别録儻或其説可採邵州舊版扵理當捐且併刻易説諫藁合而為一始克盡善庶㡬後學知所師承不為異端所惑扵道豈小補也哉昔韓文公為唐室一代儒宗而門人李漢趙徳實為之編次且序冠其首遂託名以埀不朽某晚生固不敢序先生之文幸從事扵編次似無愧扵李趙嗚呼自王氏網羅六藝斷以己意力行新法變亂舊章天下遂多事已而子壻兄弟表裏祖述遺禍無窮先生獨知尊堯愛君憂國先見之明肇扵欲萌逆料其弊甚扵中的視之若仇敵甘心犯難雖百謫瀕九死而弗悔孟軻氏曰富貴不能滛貧賤不能移威武不能屈此之謂大丈夫又曰我善養吾浩然之氣至大至剛以直養而無害則塞乎天地之間合而言之愚扵先生平日立朝行已信無疑矣百世之下凛凛英氣義形扵色如砥柱之屹頽波如泰華之挿穹昊如萬折必東之水如百錬不變之金捨吾先生其誰哉死而不亡者予扵先生見之䟦曳尾圖賛水鳴蘆根闖首吐氣彼靈扵人正以自累我寜無知言曳其尾千嵗之中君子所履郭索圖賛螯横兩戈怒目稍眊寒蒲是依下有積潦以火誘之郭索可悼彼鼎食者戒之在躁醉道士圖黄冠師未用事時見之圖畫自有蕭散出塵之想今日盗賊遍天下雖使此曹骨碎未快人憤倚竹圗楚辭凡稱美人與古樂府所謂妾薄命蓋皆君子傷時不遇以自况也好事者用少陵天寒翠袖薄日暮倚修竹便入圖畫工則工矣視小姑嫁彭郎抑何以異深谷戲猿圖自荆州上峽江深麓茂林間猿猱甚多常十百為羣反玩行旅此余所見者觀紙上通臂攫拏之狀茍得忘危亦可為愛官職者戒飛泉圖頃在龍舒夏六月與客㳺灊山天休觀飛瀑當户聲如轟霆落蒼壁萬仞下使人骨毛竦寒㡬欲挟纊今觀此圖自可却暑牧童牛渡圖牛用扵世多矣甯戚扣而歌田單火之戰丙吉問其喘不獨為耕具也與權所藏牧童牛渡圖放浪扵春陂平坂間了無觳􅑌之狀将收稼穡之功孰謂太平無象今日見之不覺涕流䟦野次孤峯圖葢自玉局老僊作枯槎怪石後人宗師之至有真贗莫辨者此為庶㡬䟦少㳺帖吾家頃嵗藏少㳺訪龍井辯才師行記手藁字畫遒媚深有二王楷法建炎丁未寓居西湖秋八月兵亂亡去今踰一紀矣忽見史侯持正所携帖念之惘然紹興庚申初夏五日真隠山人書扵水口精舍䟦蘇黄門帖蘇黄門頃自海康歸許下安居云久政和二年晚生猶及識之衣冠儼古語簡而色莊真元祐鉅公也已而與其外孫文驥徳稱相遇澶淵出書帖富甚今觀史侯所藏數幅葢中年筆札也兵火之餘豈易得哉是宜什襲遺諸子孫不妨模以墨本流傳扵世䟦東坡枯木盤根錯節無藤蘿之蔓衍而深根固柢非霜雪之彫枯類婆娑之桂影或扶踈之珊瑚豈陋人者能為此圗老燕墨戲二鬼議者多謂鬼無形似畫師易工予不然之觀此戲筆自有情状宜為好事者所愛䟦龍眠佛祖因地釋典開巻多稱世尊在耆闍窟山中或云在給孤獨園雙木下至扵少林面壁庾嶺傳衣未有不逺離人境者此圖佛祖儀相簡古行住坐卧皆在山林故古道場至今天下據形勝處蓋其源流如此䟦楚甸落帆往年自豫章下白沙嘗作滿江紅詞有所謂緑巻芳洲生杜若數帆帶雨煙中落之句此畫頗與吾眼界熟要是胷次不凡者為之寜無感慨䟦洞庭山水様士人胷中有丘壑者若能㳺戲水墨間作平山逺水固非畫工所及舊傳宋復古八法謂之活筆想見風味此蓋得其髣髴云䟦趙祖文貧士圖後晉宋間人物風流如陶淵明環堵蕭然不蔽風日短褐穿結簞瓢屢空卧北窓下涼風時至自謂羲皇上人此詩獨不顯姓字要是當時隠君子耶抑自况也貧者士之常胷次所養果厚必無寒餓憔悴色故能安扵青松白雲之下而操孤鸞别鶴之音優哉㳺哉聊以卒嵗宜其淵明願留而保嵗寒也向使望塵雅拜者稍知金谷園中竟不免禍敗詎肯相率以諂事人耶紹興己未中秋前三夕菴居不寐風雨驟来悽然有感篝燈起坐取無量所示祖文東方貧士圖作䟦遲明歸之䟦米元暉瀑布横軸老嬾天教脱世紛山川到眼失塵昬絶憐千仞鳴飛瀑一灑風中八表雲䟦蘇養直絶句後後湖醉卧已僊去但有言句留人間文采風流照千古羅浮誰復遺金丹䟦折仲古文晉郝隆為蠻府參軍有娵隅躍清池之句娵隅魚也唐顧况作閩囝詩有囝别郎罷之句郎罷父也今折丈傲睨萬物㳺戲筆端而富丈印可之如悒􅀈二字是亦古人餘意耶然攷諸方言謂使為殺當用殺禮之殺以去聲呼之庶㡬近似若迺曰柴政恐兩公一時聴訛爾䟦山居圖建炎初載秋八月錢塘營卒嬰城作亂官軍四集矣臨川王叔毅為新城令提鄊兵来旗幟精明號令甚武一日服短後衣投刀入真承祖寨陳攻打破賊䇿尤覺眉目有英氣是時坐上見所持湖山形勢水墨冩成自云戯筆也濃淡逺邇歴歴可觀予始知叔毅善畫傲睨古人胷中畧無一㸃塵土後十二年青社趙無量通守晉安出示叔毅所圖山居開巻恍然殆前身輞川今代龍眠歟念與無量叔毅為齊年故人各已四十有九齒髪向衰而萍蓬無定頗欲挹此圖區處住山活計庶㡬如對晤語無量豈亦有意耶此段因縁要當為我舉似叔毅儻問予山居之樂則未必在二子下風也紹興己未中秋蘆川老隠䟦䟦米元章下蜀江山圖紹興八年季冬既望趙無量㑹飯㵸茗竟出所藏米元章下蜀江山横巻此老風流晉宋間人物也故能發雲煙杳靄之象扵墨色濃淡中連峯修麓渾然天開有千里逺而不見落筆處詎可作畫觀耶六朝興亡實同此歎䟦陳居士傳十室之邑必有忠信一鄉善士何代無人如齊魯二大臣史猶失其名則古今隠徳不耀者多矣龜山先生所作陳居士傳形扵嗟歎而附以託孤之事為鄉評心服者雅意激厲風俗又得了堂道鄉諸公表暴之天下後世知仰居士實繫斯文也隂徳之報不在其身必在其子孫夫何疑哉䟦江天暮雨圖劉質夫建炎初與余别扵雲間今乃相遇臨安官舍出此短軸求䟦頗憶丙午之冬吾三人者蘇粹中在焉情文投合皆親友好兄弟嘗絶江同宿焦山蘭若夜濤澎湃聲入夢寐中囬首埀三十年矣人生能㡬别其樂未易復得也詩有自然之句而句有見成之字政恐思索未到或容易放過便不佳爾粹中行且来便當痛飲話舊仍和我句千山忽暗雨来時天末濃雲送落暉老眼平生飽風浪猶憐别浦釣船歸跋山谷詩藁山谷老人此四篇之藁初意雖大同觀所改定要是㸃化金丹手段又如本分衲子參禪一旦悟入舉止神色頓覺有異超凡入聖秪在心念間不外求也句中有眼學者領取閩人張某䟦䟦米元暉山水士人胷次灑落寓物發興江山雲氣草木風煙往往意到時為之聊復寫懐是謂逰戯水墨三昧不可與畫史同科也蘆川老隠云䟦東坡墨帖往在東都時見王丈樂道出示汝隂所藏歐陽文忠公雜書盈軸多用片紙問事扵宋景文諸公不以前輩自居而恥扵下問此其為儒宗也觀東坡先生帖尾所質謝幼槃取官藁事諄復尤審乃知三蘇遊文忠公門同一闗鍵可為後生文字輕脱妄發之戒䟦江貫道絶筆古松石根盤屈老蒼官絶筆慇懃記嵗寒萬里風雲欲飛化君家留得壁間㸔陳中行宣事樂府䟦尾往在東郡時稔聞陳公中行瑰竒倜儻之士儒學起家易武階守邉郡嘗遇至人授以金丹靈變甚異且戒曰非大厄未可餌金人求和公一旦奉使出塞不欲以藥自随遽感疾死外域今觀中行所書便面長短句凡六解清而婉不減唐人風味葢平生得意語也議者惜公仙風道骨雖有大藥竟不聞羽化然公之亡也丹之英華亦去所存者狀如石子孫猶祕之豈公與丹俱尸解耶後世歌此詞想見其人矣蘇養直詩帖䟦尾六篇往在豫章問句法扵東湖先生徐師川是時洪芻駒父弟琰玉父蘇堅伯固子庠養直潘淳子真吕本中居仁汪藻彦璋向子諲伯恭為同社詩酒之樂予既冠矣亦獲攘臂其間大觀庚寅辛卯嵗也九人者宰木久已拱矣獨予華髪蒼顔覉寓西湖之上始及識徳友一日出示養直翰墨凡六大軸各索題䟦適連宵雨作春泥良是中原禁煙天氣篝燈擁火追記舊逰悄悄不能寐乗醉為書且念向来社中人物之盛予雖有愧羣公尚幸强健云右甲巻士之出處隠顯各行其志顧始終一節如何耳堯舜之世不廢巢由是故楚狂接輿長沮桀溺荷篠丈人輩埀名萬古不必皆䇿勲鐘鼎也歴代信史未有無隠逸者異時董狐復出誅姦諛扵既往則養直之幽光愈彰矣玉局老僊發明在前羅浮真人印可在後中間數十年畧未嘗為塵埃所汙亦要用吾曹輒下語徳友意則勤矣尚復奚言姑以甲乙次第其巻輒歸諸巾衍蘆川老隠書右乙巻亡友養直神情蕭散儀矩雍容自是貴公子而識度超詣照了世法英妙時已甘心山澤之臞故詞翰似其為人良由家世名徳之後平生履踐追配前哲晚乃力辭召聘髙卧不起老扵丘園葢此事素定扵胷中非一時矯激沽譽者宜乎僊去雖無羅浮金丹其意已在雲煙㓕沒間久矣黄真人者那得不一引手耶蘆川老隠云右丙巻養直未見東坡時出語落筆便脱去翰墨畦逕自有一種風味真所謂飄飄然凌雲之志所以受知扵東坡先生許其為神僊中人也徳友所藏詩詞多是後湖集中所未有要當流傳墨本用貽好事者吾徳友終能深襲獨祕耶如木犀詞末句身到十洲三島心逰萬壑千巖是豈軒冕所能籠絡也平生大節如此縱非僊去自足以髙一世此語可為知者道蘆川老隠云右丁巻養直此軸十數帖皆為徳友往返尺書也其間情話無非輸肺肝雖甚匆遽時行書小草濃澹欹正初若信手而筆意俱到句中有味覽之使人忘倦至扵論虞尤佐人物挂冠神武之興此舉固清然二十四考中書令者復何人斯此論可埀方来不當只付之戲笑也蘆川老隠云右戊巻養直二十三帖作一軸筆意圓熟詞采精明如珠走槃畧無定勢而璀璨奪目光采射人反復尋繹沈著痛快誠不在楊少師之下李西臺所不及也徳友尤宜寶惜之此老不妄許可人而乃拳拳如此觀其卜居帖中所謂山色雲濤四環正當山水佳處此段果成異日遂為煙波主人公若肯入社當分半座在他人殆未易得此語也徳友其能忘懐耶頃年江左親舊説養直别業在澧陽三兩載必一往檢過經行佳處所至痛飲未嘗不與人傾倒篙師打皷發船張帆呼風每苦養直醉卧江上酒壚邉鼾息如雷也髙標逺韻當求之晉宋間此生那復見斯人耶蘆川老隠云右已巻題范叔儀所藏姪智夫山水短軸西北山川峻極雄壯良由土厚水深以故風俗醇古自昔賢傑生其地者得所鍾禀渾全質直忠信嚴重宜乎功名節義代不乏人此語可為知者道雒陽范恬智夫嘗與迺叔戲作短軸葢取范寛筆法展巻便覺關陕氣象歴歴在眼向来恵崇輩愛冩江南黄落村平逺彌望數峯隠約雖曰造化融結有殊然而秀發可喜終近輕浮何能起予滯思吾叔儀讀之當亦憮然蘆川老隠䟦跋蘇詔君贈王道士詩後文章葢自造化窟中来元氣融結胷次古今謂之活法所以血脉貫穿首尾俱應如常山蛇勢又如風行水上自然成文又如優人作戲出場要須留笑退思有味非獨為文凡涉世建立同一關鍵吾友養直平生得禪家自在三昧片言隻字無一㸃塵埃宇宙山川雲煙草木千變萬態盡在筆端何曾氣索此篇頃見别本尚餘一聨云故嵗去超忽来日俄趣装方入斷章雖曰達人大觀然太涉悲戚殆似鬼中太白真語䜟也養直下世今將一紀矣九原可復作耶讀之愴然併為從周之子庭藻記之巻末庶㡬風流不泯紹興丁丑夏至後七日蘆川老人書跋蘇詔君楚語後風雅之變始有離騷與詩六義相表裏比興雖多然卒皆正而不淫哀而不怨宜乎古今推屈宋為盟主後之數子如九懐九歎七發七啟之類著意摹倣未免重複姑置工拙如何大槩開巻使人易倦良由軌轍一律竊竊然追逐前賢步武間心殫力疲不能跳脱翰墨畦逕良可恨爾觀吾養直所作攄發己意肆而不拘凡所形容不蘄合扵屈宋政自超詣殆不可企及此章贈别從周者頃在東都一日陳去非吕居仁諸公同予避暑資聖閣以二儀清濁還髙下三伏炎蒸定有無分韻賦詩㑹者適十四人從周詩頗佳為諸公印可然則阮嗣宗喜仲容又常曰吾不如與阿戎談方之養直惓惓如此不為過也從周後養直數載云亡其子庭藻有志古學手抄離騷成誦不輟且求為迺翁跋所藏顧家有哲匠但熟讀數百過何患落筆不名世耶蘆川老人書扵檇李弭棹亭中丁丑仲夏望日䟦蘇庭藻𨽻書後二篇士抱美質必加砥礪以立亷隅始克有成若挾所長傲形扵色掩其美矣𫝊不云乎雖有周公之才之美使驕且吝其餘不足觀也已庭藻潤公五世孫種種落筆便有見處要是蘭方茁知其為國香但年少氣豪髙視萬物之表太露圭角傷鋒犯手未免遭人詆訾能痛鋤傲慢善擇交友涵養器業且飽讀古人書自然左右逢原豈易量耶予及從景謨宗丞公逰景謨宗丞公常呼予在輩行此言未為過一日故人凌世髙出示庭藻𨽻字甚古把玩久之可喜亦可念因書扵巻末廷藻其志之丁丑結制前九日老隠䟦近世𨽻學罕師西漢筆法易入八分者無他葢習魏受禪碑一落畦逕便不可醫此手法大病也廷藻始留心作𨽻字便得拙意開巻未論是非而氣象竒古已覺度勝積之嵗月當過人十數等紹興丁丑夏四月己未老隠云䟦張安國所藏山水小巻世所謂胷次有丘壑者窮而士達而公卿其心未嘗須臾不住煙雲水石間又况如吾宗安國得友人把玩短軸褾而藏之每出以示諸好事雖烏帽黄塵汩沒困頓開巻便覺萬里江山在眼界中可想蜀僧為同舎郎周旋落筆時然則安國不忘故舊風味如此胷次可知矣吳縝著唐書糾謬五代史纂誤之因嘉祐中詔宋景文歐陽文忠諸公重修唐書時有蜀人吳縝者初登第因范景仁而請扵文忠願預官屬之末上書文忠言甚懇切文忠以其年少輕佻拒之縝怏怏而去逮夫新書之成迺從其間指摘瑕疵為糾繆一書至元祐中縝逰宦蹉跎老為郡守與五代史纂誤俱刋行之紹興中福唐吳仲實元美為湖州教授復刻扵郡庠且作後序以謂鍼膏肓起廢疾杜預實為左氏之忠臣然不知縝著書之本意也按此篇見揮麈後録云得之張仲宗今附載
