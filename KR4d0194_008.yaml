body:
  text: 蘆川歸來集卷八宋張元幹撰表代謝御書卿大夫章表玉振金聲允邁開元之孝治龍蟠鳳翥還追內史之竒蹤降自雲霄光生蓬蓽中謝伏念臣蚤緣際㑹中乃邅回雖增戀闕之心敢起瞻天之望荷俯憐簪履之舊俾再依日月之光駑駘無補於事功雨露頻霑於眷渥登牀躐取每懷唐室之名卿錫宴寵頒欲誦國朝之典故敢圗珍賜下逮微臣此蓋伏遇皇帝陛下道本生知聖由天縱學已探於孔孟書宛冠於鍾張四篆髙山徒紀穆王之告千文小草漫稱章帝之工顧惟遭遇之難遂獲顯榮其老為訓以埀厯代用永傳於子孫匪懈以事一人誓盡忠於夙夜代知湖州謝表時方多事奚堪假守之權世不乏人輒預維城之選宵征赴治夕惕臨民中謝伏念臣筋力未衰而心志已疲於患難規模素拙而施設無補於艱危粵若吳興旁瞻越紀雖今日股肱之郡乃古來魚稻之鄉有此目前之便安實為己私之僥幸此蓋伏遇皇帝陛下建中興之業將恢復於舊邦求共理之良亦廣搜於屬籍臣敢不撫綏千里謹防賊盜之憑陵經畫一城更賴山河之險固啓賀張丞相浚復特進啓申命九年升華一品望著羣公之表班聨三事之崇寵數薦加忠猷益壯恭以某官經綸密勿蚤感遇於風雲燮理協和嘗寅亮於天地出入將相勤勞國家眷是殊勳臨兹巨屏體貌優而均逸威令信而底寧屈禦侮折衝之謀施坐嘯畫諾之政元戎十乘聊作鎮於甌閩泰階六符忽騰輝於宸極思萬方之助順轉一氣於洪鈞允屬具瞻式昭簡注服蒼玉之佩宛是青氊歌繡裳之詩定歸赤舄佐君王之神武拯塗炭之生靈駕馭英雄削平禍亂霆驚冦盜以必滅電掃寰區而盡收卜中興年密邇上元之甲子趨行在所雍容今代之崇臣社稷之盤石再安帶礪之山河永賴某自嗟旅次徒調制詞企踵恩門莫厠登龍之後馳心廣厦尤增賀燕之私欣幸交深敷宣罔罄賀張參政啓光奉册書入參魁柄老成登用愈增重於廟堂康濟設施副具瞻於海㝢士林胥慶公議僉諧恭惟某官名教主盟薦紳師表學允臻於聖域譽蚤播於賢關卓爾儒宗褒然舉首積年次對談王道於畎畝之中一旦二卿起相業於江湖之上受知黼扆密簡金甌果膺補衮之求佇正秉鈞之任眷遇素隆於體貌精神克壯於折衝國有蓍龜民思霖雨黃髮台背顧備福以方興衮衣繡裳宜大器之成晚蠻戎率服宗社同休某庠序諸生門䦨舊物執經嘗出於模範投迹儻在於甄陶實倍欣愈敢稽慶賀又一首祗奉明綸入參大政仰老成之登用抗正論以設施朝野悚觀士夫胥慶竊以相業在深眀於治體邦家宜圖任於舊人遇聖主乃得賢臣知寧國必有君子折衝樽爼增重廟堂恭惟某官道妙經綸文光黼黻真儒學之師表擅名教之主盟爰升丞轄之司式副公輔之望某嘗陪法從最荷撝謙顧林壑之餘齡杜門省事賴金蘭之末契託跡偷安佇聞進位於鈞衡拭目䇿勳於彞鼎商飈清肅萬寶順成覬善護以節宣益迎茂於福履私心虔頌德宇永依卜晤對以方賖積瞻馳而彌切賀翟參政啓祗奉眀綸聿參魁柄朝廷增重繄政事之得人夷夏聳觀蓋德威之足畏竊以天啓豪傑必有用而乃生時際艱危非大賢而罔濟古今共貫治亂殊科儻功業每成於無心則進退自然而可度奮身不顧處君臣一體之間直道是行陋左右游談之助凡登庸者審皆若此彼朋附者亦何能為恭惟某官經術通以佐王推先儒之領袖文章掞而華國具先輩之典型厯事三朝馳聲四海妙彌綸於胸次當相中興斡造化於筆端合居上宰雖負英偉不羣之氣常存正直在位之風眀目張膽而啓沃滋多正笏埀紳而折衝未艾載安社稷恢復輿地之山河一洗乾坤大明普天之日月永作元老昭示竒勳某罪戾孤蹤流離末路曽預登門之舊莫陪賀厦之私舉世皆驚公為蒼生而果起吾徒相慶象占君子以彚征佩服題評尤加喜抃賀陳都丞除刑部侍郎啓顯膺中制榮陟二卿公朝登用於正人羽儀增重清議依歸於直節班列生輝舉善類以起子覺斯民而向化仰窺親擢果屬老成竊以世祿象賢源流蓋有所自異材間出被遇貴得其時求忠臣於孝子之門採令譽於名德之後理應一揆進或殊塗粵若了堂真儒長雄諫垣耆舊平生剛烈論姦邪於交結之初先見著明力排擊於變更之際去國而分甘百謫篤信奚疑尊君而獨奮孤忠始終盡瘁躬履踐不欺暗室視富貴如彼浮雲曠千古以靡儔有死無二捨百身而莫贖卒老於行推天定勝人之機緘觀否極泰來之卦象然好還者雖遲亦驗顧忍窮者唯恐弗堅宜在子孫復興門户恭惟某官資性端亮胸次坦夷通六藝以經綸循五常而允蹈夙奉過庭之訓克遵良冶之傳佩服話言罔愆先志發揮事業是似乃翁受知負扆之眀爰拜司冦之命想對揚於密勿深啓沃於淵衷雲龍之㑹難逢日月之光必照聊煩持槖佇慶秉鈞某衰退何能嶔﨑可笑蚤侍先生之杖屨轉頭埀四十年與聞逺識之蓍龜倒指無二三子題評甚寵詞翰永藏自憐憂患之餘齡獲覩衣冠之盛事伸吾道英靈之氣慰前人忠憤之心敢希拔茅以茹連徒誦茂松而柏悅私相欣幸倍萬等倫賀泉州汪內翰藻啓光奉制恩寵移㑹府商飈肅駛壯徒御以遄征海氣澄開飭隂靈而奔衛諒諏辰之筮吉宜考履以膺祥恭惟某官道總四科材通八凱専良史之直筆東觀著書掞大册以髙文北門視草爰分符竹屢擁駟車推為二千石吏師懋乃五百年賢業尊儒稽古决事據經治行必以首稱威聲聞而股栗黃堂坐嘯方來傳德政之碑皂蓋行春所至立生祠之象古由太守入拜上公載瞻當寧之眷賢式際中興之盛典某夙䝉知遇自愧迃愚思逺引於舊山未能畢娶顧滯留於逆旅猶及掃門儻加三沐三熏之仁遂忘一貴一賤之勢獲依巨䕃輒叙牢愁佇接武於賔階敢通名於記室永言欣幸實倍等夷問候馬漕啓中州望族推舊德猶曉星先世締交仰餘波若時雨念暌違之歲久致修詗之禮疏敢以夤緣伸兹慕向恭惟某官行尊前輩名重本朝蚤揚厯於升平全盛之秋合飛騰於法從雍容之地奉祠自佚持節素優閲萬事以鑒明更百為而山立力扶正論綽有古風逮簡拔於外臺煩老成於近服衆欽威采益著茂庸諒暖席之未遑遂賜環而遷入某丘樊屏跡徒引領於賔閎竿牘寫誠輒通名於記室上范漕啓場屋舊遊忝盍簮於伯仲江湖巨鎮嘗投贄於丞疑念先世之交明繫同朝之仕契昔人所重此風久衰敢憑藉以夤緣輒講修於詗候恭惟某官德盛濟美材通拔尤傳家以文物相髙奉法以吏師自任蚤踐揚於中外爰刺舉於東南事迎刃以撥煩智臨機而燭理姦吏為之喪膽威采凛然後進式是服膺聲猷久矣宜升華於禁從益茂著於勳庸某潦倒山林奔波塗路輒喜故家之臭味願親雅望之話言欣頌交深敷陳罔既上趙漕啓升沉殊况全踈奏記之緘幐合并未期久廢登門之刺謁聞當路之使者乃平生之故人霏鋸屑以劇談將忘疲於終日擊鉢音而髙詠固景服於下風喜浹山居情親眉宇恭惟某官懷致君之逺業負經世之長才道合中庸文深爾雅聳孤標而嶽立恢偉量以波澄風流居晉宋之間臭味踵蘇黃之後雖持節屢回翔於外補然峩冠數獻納於上前賢宗室未足以盡之名公卿於是乎在矣通班籍甚寵加黃閣之華大筆推先行趣鑾坡之召何止家聲之不墜要同國勢以中興某多病早衰安貧處順向來五字頗䝉先德之吹噓老去三休猶冀餘光而盼睞屬寒暄之未定祈寢餗之具宜瞻頌所歸敷宣罔既賀福帥啓欽奉俞音曲從避牘擇剛辰而命帥誕孚號以揚庭作屏行宫乃眷全閩之盛虛班宥府允符分陜之雄自顧郊居罕窺邸報逮傳聞於父老均歡喜於兒童恭惟某官躬文武之兼資繫安危而獨任望隆廊廟勳著旗常被遇一人蚤擁節旄之重咨詢四嶽爰加茅土之封位嘗冠於西樞道已尊於亞傅宜赤舄而備五福果黑頭而為三公蒼珮奉觴比上東朝之夀黃堂坐嘯更寬南顧之憂崇體貌以偃藩閔勤勞而息駕聊煩共理迎皂蓋以班春竚復疇庸錫介圭而入覲姑覽海山之形勝必攜樽爼以登臨某久處丘園願見元戎之小隊竊觀衮繡似是平生之故人敢希解榻之情文第講維桑之禮數凝嚴適序跋履遵塗冀妙護於鼎茵副具瞻於巖石永言欣幸實倍等夷賀薛帥移閩啓肅膺眀制寵易近藩捨五嶺之炎方臨三山之樂土旌旄改色鼓角增雄士論所歸宸恩尤重恭惟某官天資渾厚德宇粹溫藏利器以變通藴逺猷而康濟宜處名卿巨公之位固多君子長者之風事不辭難蚤飛騰於要路人惟求舊爰登用於熙朝嘗撫荆渚之上游荐鎮贛川之劇郡懋昭異績益著先聲兹聞成命之初頒式慰羣情之素服寇攘欲殄師旅方屯咸責備於韜鈐佇召還於樞管非徒報政當見䇿勳某自棄蒿萊久棲雲壑從大將軍之幕府曩雖預乎同僚望都督府之㦸門念將陪於下客詎敢恃金蘭之契聊復伸桑梓之恭欣幸交深敷陳罔既代上泉州汪守啓顯膺眀命寵易名藩聞威令之素行竦官僚而改觀恭惟某官德盛不侮禮卑有恭力取巍科馳英聲於庠序寖登華貫著偉望於朝廷輟自禁林屢分符竹文章富以儒學政事蔚為吏師傳黟水之去思棠隂正茂卜溫陵之善政騎氣來臨某已迫瓜期尚依蓮幕重有簡書之畏敢忘竿牘之修諒非晚而賜環定不容於暖席台躔在望商律屆凉仰冀上為邦家精調饔寢賀邵武江守啓顯被制書寵紆郡紱父老傾心於豈弟官僚側足於嚴明惟時共理之良允屬承流之化恭惟某官德盛不侮禮卑有恭奉三尺以周旋惟聞疾惡遵六條而戒飭所在至公矧鄰梓里之封式布棠隂之政雙旌上塜榮先世以孝思一舍下車等故鄉而均逸人生之五馬尤貴刺史之二天可依奏最課以報成錦衣行晝據要津而驟用荷槖還朝某投老無堪倦游滋甚敢期㑹晤忝居賢伯仲半面之間方歎滯留獲厠衆賔客差肩之列永言欣幸奚究敷宣代上吳倅啓川途修阻雖夙仰於下風竿牘交馳顧久稽於公府偶出廟堂之過聽遽膺戎旅之虛名獲託帡幪用伸悰悃恭惟某官德盛無侮禮卑有恭堂堂七尺之軀凛凛萬夫之望初不畏其強禦欲盡殄夫寇攘惟兹千里之提封允賴二車之關决吏民何幸僚屬攸歸行當嚴召以造朝入據要津而壯國某宦遊衰晚材力疲庸坐糜良愧於斗升立效難施於尺寸幸披雲之伊邇許卜日以參承書代洪仲本上徐漕書某家世豫章豫章之為郡襟帶江湖控引夷越乃東南一都㑹冠蓋往來方軌擊轂連檣銜尾皆川途所必經行非僻在寒陋少見聞之地而諸父外舅俱山谷老人甥也一時交游多當世知名士某方為兒童已竊聽前輩論議耳根熟矣其論曰部使者號為外臺布在海內皆天子耳目之官一路休戚所係至重委任要當得人若新進少年往往邀功生事私喜怒而作聰眀必也老成重厚者則精練詳盡凡百舉措無不中理能使列城望風知畏所務斬然政不用妄作威福故其所汲引莫非異才誠以類進也粵自束髮試吏四方如九江三吳逮今七閩又皆士夫淵藪是非毁譽厯厯齒牙間二十年來從事州縣所閲部使者多矣繹思前言如成都費孝先揲蓍寫影吉凶禍福久而悉驗始信先生長者之語果可書紳以是某持不妄干舉將之戒寧書下下考老銓調頗不願濫為人門生殆癡絶爾恭惟某官圭璋國器鄒魯名儒設心甚公而行事以正深得夫前輩典刑真所謂賢部使者其為屬吏亷貪勤惰不逃鑒裁固已破肝膽矣某復何言然土風亦不可不試論也閩有八州而福為大府負郭之邑鼎立焉候官處三者中跨疆接境户口星散最號多事聽覽貴審而决遣未竟輒越訴矣其好訟如此且喜請求於形勢家名曰關節將一切拒之歟則為縣令者未免遭謗所謗忽起於無根雖辨士不能自解也某於斯惴惴焉初未始絶其來借使胸中先置纎芥疑蓋又慮是間豈無抑屈非辜誠可信者盍為直而申之歟某愚且暗平日執守但顧三尺法如何耳他不遑恤閣下儻已知其土風則某定獲預門下士之列不然積以歲月是非毁譽雜然並進於執事者之前恐未易批判也冒瀆髙明悸汗之至
