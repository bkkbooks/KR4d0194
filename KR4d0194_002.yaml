body:
  text: 蘆川歸來集卷二宋張元幹撰五言律詩次韻唐彥猷所題顧野王祠與霍子孟廟對蘭若黃門像相望博陸居衣冠塵亦暗簫鼓祭全疏草色侵荒徑潮聲過夕墟遺風猶可想弔古一觴餘過宿趙次張郊居二首北客多流落東村更寂寥肯同清夜夢不待故人招月挂荒園竹霜飛獨木橋聽雞休起舞且共論天驕莫歎交遊晚相期嵗月深秋來初識面老去要知心燈火須更僕杯盤取自斟平生王霸術袖手有微吟次韻奉和平叔亭林至日之什雲物果何好客愁今更新坐來江月白興在雪籬春我輩且同酌公詩殊出塵莫思淮海上黑幟雜黃巾花飛雨暗連兵氣花飛點客愁寓居皆野寺相過只扁舟不作新塘去還為後泖遊盤飱雖杞菊得飽勝椎牛送江子我歸嚴陵久客驚秋晚懷歸更送君亂來俱避地老去惜離羣山閣杯浮菊江城鴈度雲行行經釣瀨時事不須聞亂後亂後今誰在年來事可傷雲深懷故里春老尚他鄉寧復論秦過終當作楚狂維舟短籬下聊學捕魚郎返正諸將爭傳檄羣凶尚阻兵天旋黃屋正日轉赤墀明喪亂多妖孽經綸貴老成鯨鯢終必戮草木已知生冬夜有懷柯田山人四首聞説新居好山樊卜築深藥囊能濟物龜策少知音四海憂黔首中原盡緑林直須期雪屋夜棹去相尋坐閲干戈擾輸公已定居生涯今易足世態莫嗔渠晷短全疏客窗晴好對書故山常入夢何日到吾廬客裏了無况亂來何止貧淹留頻換嵗老大更思親泥飲思田父供糧乏故人自憐歸未得不是白頭新雅欲賦招隱何堪弔戰場獨看星錯落久立夜蒼茫羽檄來東越風煙隔下塘安間隨處有冠蓋莫相望登埀虹亭二首一别三吳地重來二十年瘡痍兵火後花石稻粱先山暗松江雨波吞震澤天扁舟莫浪發蛟鰐正埀涎熠熠流螢火埀埀倒飲虹行雲吞皎月飛電掃長空壯觀江邊雨醒人水上風須臾風雨過萬事笑談中送趙公逺往建康王孫朝謁去功業歎流年強項今三已棲遲未九遷笑談曾擊賊謀略合臨邊秋雨長干路歸時且著鞭偶成寄友人萬里天南客三年日至歸羣隂雖久否吾道豈終微顧我民稱逸如君遁正肥鯨魚波浪穩雲翼有時飛感事四首丙午冬淮上作國步何多難天驕據孟津焦勞唯聖主遊説盡姦臣再造今誰力重圍忌太頻風吹遷客淚為灑屬車塵血灑三城渡心寒兩路兵洛師聞已破陵邑得無驚憤切吞妖孽悲涼托聖明本朝仁澤厚會復見承平戎馬環京洛朝廷尚議和傷心聞徇地痛恨競投戈始望全三鎮誰謀棄兩河羣凶未葅醢吾合老江波肉食貪謀已幾成國與人珠旒輕遺賊玉册忍稱臣四海皆流涕三軍盍奮身不堪宗社辱一戰靖邊塵丙午春京城圍解口號戎馬來何速春壕緑自深要知龍鳳聚不受虎狼侵九廟安全日三軍死守心儻為襄漢幸按堵見於今漫興老答書題懶貧營口腹忙未能忘壯志詎肯變剛腸晷短催寒急燈明伴漏長牀頭褚衾在不怕滿簷霜奉送富修仲赴南昌尉吏道雖餘事人情要飽諳家風端自守句法有同參南浦翻雲浪西山滴翠嵐折腰與趨走政恐未能堪夜宿宗公丈室求詩甚勤為賦五字林表登層閣秋聲隱暮鐘鴉歸苦竹寺雨暗亂雲峯屢乞留新句重來訪舊蹤松門罕車馬似喜老夫逢范才元參議求酒於延平使君邀豫同賦謹次其韻桑落冷篘玉菊籬霜著天飄零河朔飲悵望竹林賢烏有防前轍青州貴下田使君能遣騎端為喚魚船次韻朝伯南飲董彥達官舍心逺堂今夕知何夕真成纍十觴爐薰飄月影蜜炬剪花香政懶還詩債無從發酒狂故人憐久客舞袖要須長喜錢申伯病起二首一室維摩老長年法喜遊苦心翻貝葉癡坐寫蠅頭可是文園病何堪杞國憂我知公健在骨相合封侯花飛傷宿雨山潤照清晨念子經時卧嗟豫一味貧稍聞疏藥餌遐想整衣巾何日扶藜出相陪醉晚春叔易自三吳歸同赴竹菴荔子之集二首惜别梅花雨來歸荔子秋江帆成昨夢雲嶠忽重遊共喜身長健寧論客久愁殷勤老居士更為寶峯留客去雲俱散山空月正圎不參藤樹句自透竹菴禪骨法凌煙像家聲鼓瑟篇直須陪叔季急佐中興年寄錢申伯二首子去客昭武今儂懷舊遊青山渾在眼白髮暗添頭旅食今安好歸程儻滯留溪邊因野步試覓水明樓一點照今古胸中殊了然不妨為漫吏可但號臞仙丹荔盟猶在凝香句未傳秋風稍涼冷速辦下灘船真歇老人退居東菴豫過雪峯特訪之為留再宿仍賦兩詩雲卧孤峯頂齋餘閉户眠時容龍象衆來説葛藤禪此日輸真歇平生最信緣從渠魔起謗把火漫燒天山月轉松影澗泉鳴夜忩清談虎溪逺癡坐鹿門龎敵國終亡滅邊城合受降晨鐘發秋思同夢繞三江解嘲示真歇老人二首不作市朝夢生憎城郭居前身真衲子妄念入儒書丘壑無疑老軒裳久已疏世人多大屋爭笑賣吾廬毁譽何時了雞蟲事可知不妨遭點檢好在莫相疑髙爵非吾性竒勳任爾為道人元具眼批判亦慈悲申伯有行色會宿東禪次元韻真成風雨夜精舍對床眠去住非無數行藏莫問天十年瀕瘴海一棹破春煙君自足歸興不妨啼杜鵑次折樞留題雪峯韻軒冕本無意煙霞如有期故人容野老勝餞見新詩誰辦兼忘世公當急濟時春歸仍送别好在出山遲次韻范才元中秋不見月不見中秋月長吟五字城浮雲有底急清影可憐生殘夜四更句故人千里情與君同悵望天上自分明次吕居仁見寄韻老去猶為客誰人念退居相望千里路賴有數行書白曬猶堪寄烏牛政憶渠何時聞枉駕竹裏喚行廚次韻劉希顔感懷二首春光埀老日北騎欲歸時王氣如三捷歡聲定四馳山河還舊貫草木有餘悲擬頌中興業孤忠只自知避謗疏毛頴推愁賴索郎坐來春漏促夢去畏途長故國書題冷新詩齒頰香湖山雖好在嵗月已相忘郭從範示及張安國諸公酬唱輒次嚴韻登樓乘暇日喚客共澆愁春去花猶發隂濃雨未休和詩真冷淡得句總風流能遣西鄰老殊無陋巷憂上張丞相十首閩粵諸侯地春風盡去思三年歌德政萬户繪生祠位極聊方伯謀深必帝師待公安社稷四海被恩私廣漢家山逺臨川道路旁安輿懷故壘同氣聽甘棠雪後風煙潤春歸草木香丹心馳魏闕夢想萬年觴活國勳竒甚平戎志未衰肯從時論屈自許世人知豹尾遙臨鎮蟬冠暫祝釐天將擒頡利露布捨公誰百六古今有兩宫開闢無興師誠刷恥奮袂競捐軀必挾三靈助能令萬國孚九宫驅六甲何患五單于擾攘干戈際中原禍太深野心殊叵測內地任頻侵日昃那常晦陽生自剝隂德光非不僣終識殺狐林國士多孤憤君侯特長雄玉墀曾復辟鐵券會論功宇宙尊文物關山界土風力扶炎運正此意合蒼穹袞繡春秋富旗常事業新三遷推孟母一德表商臣任重能知止功成合保身儻容陪几杖同訪赤松人賤子居閭里明公總帥權姓名誰比數禮遇每周旋老去無三窟間中有二天知音何日報願見中興年罪放丙午末歸來辛亥初不談天下事猶誦古人書利病明諸掌危疑警後車他時果無悔載籍定欺豫簮紱久已棄行裝今甚疲買山如略辦畢娶更奚為小築開三徑躬耕趂一犁賴公霖雨手忍賦語離詩送李文中主簿受代歸庭闈豹隱猶遮霧鸞棲遂及瓜緑林方在境綵服徑還家世路久來險人情何用嗟胸中自丘壑樂處是生涯戊辰春二月晦日同棲鸞子送所親過寶積題壁間春江因送客雲嶠更登臨精舍經行地征人去住心猿啼清夢斷花落曉忩隂勝踐成三宿俱來此意深代上張丞相生朝四首上相生坤位中興運泰開德威加異域文武屬全才南極星躔煥東方騎氣來下車逢誕日喜色照樽罍竒勳施社稷萬世許忠嘉賔日扶神器回天坐正衙貂蟬峩上衮鞀鼓擁髙牙暫屈臨閩粵重聞降白麻坤維標厚載任重出宗臣眉宇如虹氣儀形似玉人中興真有相命世必逢辰霖雨聊均逸餘波潤七閩將相兼文武謙光接下僚輿情爭快覩善頌適生朝勳業當興宋謀猷永佐堯千秋迎夀母忠孝稱金貂李丞相綱生朝三首炎景生賢佐三朝火王時德威雖敵畏忠藎只天知安國驚何久收功會有期他年調鼎地黃髮屬公師又作去國驚華髮為霖在赤墀十年門下士方獻此篇詩戡亂登廊廟羣公數靖康一身輕去就百口恃安強天意非難見人情漫自涼殷勤酌周斗矍鑠更鷹揚希世推英偉行藏孰是非橫流曽砥柱袖手且深衣槐影搖黃閣星躔煥紫微山林愚已老衮繡看公歸挽少師相國李公望表公師位身兼將相權三朝更出入一德奉周旋盍為蒼生起曽扶大厦顛何知老賔客擁篲掃新阡往在東都日傷心丙午年不從三鎮割安得兩宫遷抗議行營上排姦御榻前英風成昨夢遺恨落窮邊城守麾強弩諸班果翕然雲梯攻正急雨箭勇爭先中夜飛雷炮平明破火船如公真徇國繪像冠凌煙壯志深憂國丹心篤愛君謗書興衆枉諫疏在竒勳風咽梁溪水山悲湛峴雲空餘雙舞鶴鼓吹不堪聞淚盡西州路碑留峴首名買山緣荔子為圃養黃精所至登臨地猶疑步履聲堂堂真漢相天忍閟佳城挽寺丞許子如盛世黃門嗣輕裘緑髮時傷心來故里刮膜訪良醫春雨銘旌暗東郊薤露悲人生得意早遺恨在孤嫠挽夢錫機宜寺簿零落梁溪客何堪鄭子悲閉門専學易擁鼻愛哦詩臭味方投合行藏罕遇知他年鄉飲酒揚觶想威儀太府堅辭掾平陽頃著功清貧名教樂靜退昔賢風俯首稠人裏甘心正論中胡然成鬼録骨相本三公問疾方旬浹殊驚不起傳所欽期異日何意遽終天圗籍嗟空富生涯衆漫憐保家宜有後一角儻稱賢挽林天和歎息宜春守抽簮未亂歸不應徒告老要是久知幾築室聊遮雨耘田止療飢杜門何悔吝牖下斂朝衣行配古君子齒尊鄉丈人儻來名位晚長往誄文新薤露空悲臘芻靈不見春諸郎無過毁夀考沒元身挽李仲輔三首畫省何心入軺車隨分行急難頻太息交友舊馳聲素月墮江影白雞悲夜鳴繡衣無復出部曲把銘旌貌古期驚世心夷合享年交遊稱長者風味配先賢鴈序飄零地龍門寂寞邊不知誰作誄著意翠珉鐫人生真寄爾天問竟悠哉三載重凶釁一門皆異材尚疑書未報遽有訃先來淚盡餘青血秋風萬壑哀彭德器北堂太夫人挽詩蚤嵗嫠居久儒家守志貧白頭躬祭祀老眼喜縫紉哭婦無遺恨憐孫不忍嗔一朝違孝養力疾呌蒼旻劉建州母夫人難氏挽章慈顔推夀相懿範在吾鄉不待黃堂養空遺紫誥藏板輿悲騎省鶴客弔龍驤風卷銘旌去松岡閟夜長五言排律李丞相生朝柱史生周室仙源譜系崇儲星昭昴宿降嶽表神嵩間氣憑家世宗臣挺祖風夢求終作楫獵卜果非熊感遇雲龍會恩深雨露豐折衝淵聖日輝赫靖康功社稷欹傾際乾坤震蕩中力扶神器正堅守帝都雄割地爭三鎮回天定兩宫壯圖期敉難大節恥和戎去國孤舟逺憂時百雉空建炎欣翊戴鴻慶襲光融相印機衡重兵權號令通安危繄禮貌進退肯雷同巨屛頻循撫真祠示眷蒙歡聲逢穀旦善頌達蒼穹弼亮需元老平章合上公五行推有本六甲混無窮再造邦基固中興大運隆保民躋夀域千載簡宸衷張丞相生朝二十韻鳯厯推炎德宗臣繫重輕神開丹扆夢人向紫巖生昴宿秋旻迥坤維玉露清風雲符感遇草木畏威名不有三靈助寧無四海驚大江元帝渡細柳亞夫營徑氣吞妖孽深謀厲甲兵天旋黃屋正日轉赤墀明茅土宜班數山河舊著盟濟時登衮職命世屬阿衡社稷扶持了乾坤整頓成勳庸多部曲陶冶遍公卿牙帳羅旌棨萱堂合鼓笙誕辰尊夀母善頌及難兄慶積基墉固源長福祿並欲知貂珥貴倍覺綵衣榮象闕鋒車召沙堤相印迎指麾烽燧靜翊戴泰階平老鶴三千歲飛鵬九萬程百川浮巨斚快飲吸長鯨
