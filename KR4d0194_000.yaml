body:
  text: 提要蘆川歸來集十卷别集類三宋臣等謹案蘆川歸來集十卷宋張元幹撰元幹字仲宗自號真隱山人又曰蘆川老隱周必大跋其送胡銓詞稱長樂張元幹睢陽王浚明跋其幽嵓尊祖録則稱永福張仲宗皆宋人之詞莫詳孰是也王明清揮麈録紀其以作詞送胡銓得罪除名考卷末其孫欽臣跋語稱得賀新郎詞二首真跡于銓之子其說當信然銓貶於紹興戊午而集中上張丞相詩稱罪放丙午末歸來辛亥初又自跋祭祖母劉氏文後稱宣和元年八月獲緣職事道過墓下則徽宗時已仕宦欽宗時已貶謫但不知嘗為何官耳元幹及識蘇軾見所作蘇黃門帖跋又從陳瓘游頗久見所作了堂文集序其結詩社同唱和者則洪芻洪琰蘇堅蘇庠潘淳吕本中汪藻向子諲見所作蘇飬直詩帖跋而江端友王銍諸人皆有贈答之作劉安世游酢楊時李綱朱松諸人皆為題幽嵓尊祖録故其學尊元祐而詆熙寧詩文亦皆有淵源其集今有鈔本稱嘉定己卯其孫欽臣所鋟然跋稱誦上陳侍郎詩序知掛冠之年甫四十一鈔本無此篇又曽季貍艇齊詩話載元幹題瀟湘圖詩鈔本亦無此篇考胡仔苕溪漁隱叢話稱嘗録元幹之詩一卷而元幹不自憶則當時已不自收拾疑欽臣所録本有佚失然鈔本但五言律詩一卷七言律詩一卷而無古體及絶句知非完書又跋米元暉瀑布軸跋蘇飬直絶句後跋江天暮雨圖跋江貫道古松絶句反收之題跋類中亦似後人所竄亂非其原本及考永樂大典所載則所佚諸篇釐然具在今裒集成帙與鈔本互相勘校刪其重復補其殘缺定為十卷元幹詩格頗遒雜文題跋諸篇具有蘇黃遺意蓋耳目漸染之故也鈔本末有遵祖録一卷乃記其為祖母外家置祭田事附以同時諸人題跋中多元祐名臣之筆亦仍其舊第併附録焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀蘆川歸來集原序士君子處世不以富貴貧賤纍其心者其所養可知也所養既厚則所言者必徑正清峭而無輕懦衰憊之氣前哲之士以文詞鳴者此也孟子曰我知言我善養吾浩然之氣孟子之知言自其所養者充之也韓子曰氣水也言浮物也水大而物之浮者大小畢浮韓子所學獨以孟子之傳得其宗者蓋謂是也故直而不倨曲而不屈孟子之書可與風雅並傳而汗瀾卓焯奫沄澄深李氏之以大振頽風序韓文後之作者蔑以加于此矣蘆川老隱之為文也蓋得江西師友之傳其氣之所養實與孟韓同一本也自其為太學生也嘗裒其亡友唐慤生詩帖軸而藏之則公之氣槩固已蜚揚於學校中矣及其仕於朝也又以幽巖尊祖一節直述其忠厚悃愊之誠公之孝友性成皆是氣之所形見也宣和諸公或言其近作殊有老成之風無復少年書生之氣或言其平昔絶俗之文今又見髙世之行是猶未覩其全集也公以强仕之年遂掛冠之請兹蓋不以富貴貧賤纍其心者所養者大所言者真表裏相符聲實相應夫豈嘲風咏月者所可同日語宜乎近世名公勉其孫以文集行於世欲以見公之節也即公之文驗公之行其作也古其傳也宜噩里人也敬慕三張之聲價久矣館寓家孰復得斂袵以受教於公之文集凡裒集書啓古詩律詩贊序等作共十五卷幽巖尊祖録一卷附于其後樂府二卷見于别集於是乎有考焉公諱元幹字仲宗任將作少監年方四十一已致仕後贈正議大夫邑人曽噩序少監張公早歲問道於了齊先生學詩於東湖居士凡所逰從皆名公勝流年未强仕掛神武冠徜徉泉石浮湛詩酒又喜作長短句其憂國愛君之心憤世嫉邪之氣間寓於歌詠紹興議和今端明胡公銓上書請劍欲斬議者得罪權臣竄謫嶺海平生親黨避嫌畏禍唯恐去之不速公作長短句送之微而顯哀而不傷深得三百篇諷刺之義非若後世靡麗之詞狎邪之語適足勸淫不可以訓公博覽羣書尤好韓集杜詩手之不釋故文詞雅健氣格豪邁有唐人風公之子靖裒公長短句篇屬余為序某晚出恨不及見前輩然誦公詩文久矣竊喜載名于右因請以送别之詞冠諸篇首庶幾後之人嘗鼎一臠知公此詞不為無補於世又豈與柳晏輩爭衡哉公諱元幹字仲宗自號蘆川居士云蔡戡序叔祖蘆川老人張公仲宗諱元幹以文章學問馳譽宣政間官將作大匠志尚林壑方少壯時挂冠謝事靖康之元上却敵書見了翁談世事於廬山之上了翁曰猶有李伯紀在子擇而交之公敬受教從之遊激昻奮發作為歌詞有人間鼻息鳴鼉鼓遺恨琵琶舊語之句此志耿耿殊非茍竊祿養阿附時好者之比逮紹興末忤時相意語及譏刺者悉搜去掇拾其餘得二百餘首先叔提舉鋟木於家廣追念先志之不可不述因得私識其略尚有文集數百篇姑俟作者併為之序云紹熙甲寅姪孫朝議大夫端溪張廣謹序
