body:
  text: 蘆川歸來集巻十宋張元幹撰贊薌林居士贊雍熈相國之胄憲肅母后之家視富貴如浮雲棄軒冕猶弊屣良由天資抜俗雅志好賢臨事必欲出竒為善常恐不及所謂胷中丘壑皮裏陽秋盖自英妙時固已沈著痛快矣雖曰守節仗義而逺跡危機雖曰正色立朝而獨往勇决殆將明哲以保身優㳺以卒嵗者歟若夫袖手旁觀傲睨一世福禄未艾俟命方來則予謹在下風也識者見之亦必有取於斯語俞羲仲畫贊神鋒清兮有臞儒列僊之風骨勝度閑兮無公子王孫之習氣外和同於衆人而中傲睨於一世袖手旁觀不妨逰戯與予定交埀四十年更歴險夷未嘗以升沉炎凉毁譽軒輊使其聳壑昂霄一日特起雍容進退所謂若素官于朝者非斯人而誰耶彭徳器畫贊凜然其容也雖甚荘視江左風流兮所長琅然其辭也雖甚辯異戰國縱橫兮可賤盖氣節勁而論議公心術正而識度逺使之臨敵對壘則必以巾幗遺人若夫委質䇿勲自當以劔履上殿野服兮蕭散用未用兮又何怨知我者無取八州督不知我者聊復三語掾范叔子畫贊色荘而語簡性舒而度勝固嘗叩之以前輩出處典刑參之以方冊治亂譏評初若無意是非莫定從容乆之彷徨四顧而乃衮衮如川流霏霏如鋸屑大抵心術公而論議正信乎鑾坡之世家傳諸唐鑑之學問儻未見於行事施於有政將何以發胷次渟衍之深且孰能繼門戸人物之盛吾知佩玉珥貂遭時遇合猶當勉焉自不失其為名卿聊復冠屨櫑具逺而望之僉曰儒服斯之謂稱妙喜道人真贊無礙辯才正法眼藏喜怒妄真初不著相坐斷生死路勃跳毗盧頂上吞却栗棘蓬管甚黄茅瘴有認得老師放他三十拄杖慧照譽和尚真贊行解一如根器純熟果位中古聖賢叢林中老尊宿三樂十二分橫說倒說圜通八萬四千門胡現漢現具足大洪山頂運慈悲攝受虎狼虵虺毒正當恁麽時好作沒量福維摩鉢裏遍虚空活盡行旅衣冠族誰能辨此供養心要使衆生脱魚肉我知芙蓉宗𣲖有兒孫那箇是渠本來真面目咄康伯檜畫贊元紫芝眉宇澹然簡古謝幼輿丘壑正爾卓犖廼若吾子以邁往不羣之氣與神鋒太雋之姿方㓜輿恐未免於冨貴慕紫芝雅有志於文辭蓋浮㳺物表殆彷彿其如此彼輪囷胷次亦孰得而知耶西禪隆老海印大師贊揚子江心飽經波浪臨平山上看盡風光驀然唱箇還鄉曲來坐海上古道場其圜機轉物也山河大地不離掌握其辯口談天也邪魔外道為之膽碎知我者謂我逢場作戯不知我者謂我拖泥帶水請看父母未生時只這面目何曽是咄醫僧真應贊慈濟之孫慧覺之子以疾苦度諸衆生以藥石作大佛事是為僧中之扁鵲故能療人之埀死而圓頂方袍亦畧取其形似者也髙盖長老真贊喚作似慈濟也喝唤作不似慈濟也喝夢幻泡影本來空耳鼻舌身皆假合慈濟由是强名梵志常翻著韈赤灑灑活潑潑咄蘓廷藻畫贊賢公孫而樂為寒士生涯佳少年而慕用前輩風味蓋名駒在閑已有千里之足於莵墮地便有食牛之氣天乎早孤自立于世噫抗志患不髙其髙常失於絶物閱書患不廣其廣或滯於未通必也裹陽秋於皮裏吞雲夢於胷中是冝尚友古之人道何慮不挺挺然祖風充乎大者自可以華其國用其小者亦足以美厥躬自贊爾形侏儒而行容與所守者獨出處之大節所歴者皆風波之畏塗彼其或取者在是為之不恱者有諸使其佩玉劔履定非廊廟之具野服杖屨庻㡬山澤之臞乎丙寅自贊這癡漢没思算初乏田園却懶仕宦辦得所向方圓未嘗敢做崖㟁只用兩僕肩輿不羡儻来軒冕投閒二十餘年善類干煩殆徧好之者徹底信其真貧惡之者豈免遭他㸃檢要當畢娶杜門自斷此生憂患罷去謁府參官一等著衣喫飯休拈翰墨文章說甚安危治亂就使立事赴功决定違條礙貫箇中人髙著眼方瞳緑髮照青春期與飛仙逰汗漫現此風狂道士身長庚曉月聊相伴庚申自贊一且謂吾仕耶毁冠裂冕與世闊踈一且謂吾隠耶埀手入􅆵與人為徒愧姓名之未能變何形容之猶可圖頗欲治貨殖兮方陶朱公不足聊復啖杞菊兮視天隨生有餘行年五十矣雖髭髮粗黒然田廬皆無陶陶兀兀遇飲輒醉著枕即寐一念不生萬事不理至於酒醒夢覺則又大笑而起摩腹叩齒孰不睥睨曰此老真甚愚甲戌自贊蘆川老居士今春六十四勇退急流中畢竟只這是胡為元命年輒下廷尉吏業風何見吹逆境忽現示儻非造物慈孰貸小人戾故山念欲歸夙債尚留滯骨肉頗相忘眠食初未廢心存自在天脚踏安樂地歡喜待衆生寃親平一切騰騰兀兀行黙黙𤣥𤣥意翛然岸幅巾聊冩形神氣認取主人翁莫問似不似咄陳居士團圞贊我觀世間種種業此老化行無盡緣示現百年居士身來償七子未了債是心久作露雷觀寃親悉具解脱門何止九族出輪廽普願衆生成正覺圓浄律師贊師傳行業攝羣魔及見東坡所得多老向西湖清徹底更開雪窟現森羅圓首座贊横挑楖栗布囊寛江北江南踏遍山參得黄龍死心句歸來誰問透三闗東坡為焦山綸老作木石却書招隠一段因縁在紙尾圜菴寳之欲贈好事大檀越作歸止計為題數語招隠公案焦山戯墨雖然信手拈来自是胸襟流出價直百千兩金成就圜菴三窟咄布袋和尚贊維此大士無邊身三千大千同微塵慈悲憫爾末刼人顛倒雜懐貪癡嗔布囊示現睡豈真作如夢觀非想因刼火不壊囊常存衆生悉度解脱門我來稽首彌勒尊普為説法一切聞銘山桂菴銘晉安劉公華即延平官舍西麓誅茅結廬面山旁桂地不踰丈而盡挹勝覽真隠居士過焉命曰山桂菴取小山叢桂之句也因為作銘銘曰眼界貴寛心地貴閒耳根貴静劉子結廬畏此簡書雖吏云隠山光蒼蒼谿水泱泱是用適性旁據桂叢秋芬揚風俯視奔競誰為賞音與時浮湛期則有命凡厥後來優哉㳺哉順受其正休菴銘同郡李君應求榜其燕居曰休菴嘗屬桐鄉朱公新仲為之記出以示予且乞銘座右書云作徳心逸日休噫仰不愧於天俯不怍於人厥有㫖哉予以是知應求所存心矣作休菴銘銘曰古君子儒環堵之室心廣體胖既安既佚養此休譽時乃休功為名公卿休祥在躬墓誌銘晉安黄夫人墓誌銘有宋處士鄭君徳稱之室黄氏台州黄巖縣尉諱待問之長女黄鄉先生也家世晉安夫人自㓜聰慧過人事親誠孝先生夫婦素鍾愛之擇所宜配年二十歸處士治家漸漸有條理嵗時祀事必躬蠲潔馭臧獲輩寛猛適當得其懽心未嘗施鞭撲唯以善言誨訓之率就規矩不怒而威咸恥有過失十五年中安貧自樂順適處士之意頗如徳耀事伯鸞内外姻黨無間疎戚聞夫人之風靡不欽慕嵗在癸巳夏四月處士殁於大父舊廬夫人時年未四十持䘮甚嚴諸孤纍纍然方齠齔夫人非特能守其志且慮郊居從師匪便亟斥賣奩具得舍數椽直郡庠之左俾兒曹朝夕尊所聞見盖不待三遷果皆業儒夫善師孟母若夫人者鮮矣紹興辛未春正月以夀終享年七十八後七年戊寅嵗某月某日岊舉其柩合𦵏於處士墓是為懐安縣欽徳里文山之原男三人長曰岊次曰岳早卒季曰岡嘗預鄉薦不禄女亦未嫁而夭今獨岊存孫男二人曰庚曰育皆為士孫女三人長適進士陳炳文餘在室岊雅尚不羣無心進取以翰墨遊公卿養母盡孝人喜餽之用助甘㫖與予别八九年矣三遣書白𦵏期必欲求子銘其母每請愈堅義不可辭乃為之銘曰銘闕祭文諸公祭鄧正言文維紹興二年嵗次壬子五月庚申朔三十日己丑友人宇文師瑗張世才王時張宇林楊休王傳蘓籕余良弼黄豐洪枿朱松馮至游吳叔虎朱偁李議之張元幹等謹以清酌庶羞之奠致祭於亡友正言鄧子志宏之靈嗚呼哀哉吾志宏負卓越不羈之才騁縱横無窮之辯夫豈不能揣摩捭闔以巧速化抑豈不能趦趄囁嚅以容悦茍賤雅欲正色而立朝率由直道而事君始也風刺名重諸生㡬中竒旤坐為諫臣耻賣友以自售寧甘心而守貧故其放斥流離一寓意於盃酒悲歌慷慨時記興於詩文澆胷中塊壘不平之氣同世間陸沉未遇之人是身雖詘此道則信或竊笑以技窮固多相期乎器逺水莫改於萬折金益堅於百鍊議論人主之前周旋天下之變皆吾子所優為忽盖棺而不見嗚呼哀哉子有老母病久未痊夕不解衣藥必手煎積憂成病反喪盛年母乃哭子彼蒼者天想英姿兮如在聆妙語兮閴然邈楚些之不招兮諒蜕去而為飛仙誰撫諸孤養其華顛心折涕隕尚復忍言嗚呼哀哉尚享祭老禪文惟師具無礙辯才得自在三昧上将軍之權謀烈丈夫之意氣縦横妙用巻疎大千迅發機鋒雷霆一世盖多生伶俐衲僧作出世間本分尊宿論供養不止乎平生所至􅓜林而縁法周旋尤與賢士大夫號為宻熟者也人生衆前舉揚批判音吐調暢如叩洪鐘語句流通如傾黄河抝折拄杖掀倒禪床放去收來有殺有活老祖佛眼廼父坐大道塲歴七八數必皆神運斤斧鼎新革故不日而成屹屹棟宇昔在涌泉門庭大開幻出寳閣國師再来聞師嘗言最勝幢塔自我建立無壊無雜它年靈骨歸窆此山於今三秋老禪果還凡厥來祭莫逆心契霧慘爐峯緇白俱涕追懐曩遊福城東際自利利他普及一切雖然踏著秤鎚不妨活潑潑地咦尚嚮祭東禪䝉菴老文象教既衰邪師四起楊歧正宗付在妙喜龍象蹴踏嫡子是似維此上人固得其髓平生江湖遍參不已晚見廼翁出語輒契掃盡禪病人心直指令行諸方盖天盖地作大因縁愛好兄弟所向腰包川赴雲委一㸃難瞞衆肯有㡬法門棟梁福城東際黄葉西方九旬解制獨照孤燭時節俄至撒手懸崖跏趺而逝胡為貪程畧不住世訃聞衡陽重􅋞老涕萬里寓哀就幃以祭人天眼目誰其可繼懶菴聿來斯道木墜舌端雷霆説一不二如聆師言四衆用慰稽首歸依奚止我輩從來切忌犯手傷鋒末後何由拖泥帶水且問一道神光爭如三幅白紙䝉菴如是如是祭精嚴長老達空禪師文惟師人物昂藏材器猛利夙具般若鍾智普熏知見之香痛掃世縁跳出火宅以鉢囊拄杖易去銀貂左璫服青伽梨續佛夀命雖石鞏張弓一重公案未易優劣如何示疾遽用貪程末後句子可謂了了回念三十年前見師落髪入慈受室蔚為龍象恍若昨夢此㑹儼然無量刼來㡬生㡬滅屈伸臂頃師達其空稽首世尊如是如是尚饗祭西禪隆老丈謹以香燭伊蒲塞之饌致祭於某人嗚呼頃之識師臨平始歸退處彼菴鍾山其西粤時宣和己亥季夏圜頂加冠以笑以語傷今念古師適我同由爾定交有孚于中别曽㡬何亂起方臘克勘南征爰奮北伐四海横潰我還舊廬憂患荐罹獨師憫諸師生丙申閲世爛久吾閩有禪師必稱首百年老榕忽仆道周此木其壊職師是憂我来哭師本安用哭聊慰後人示激頹俗尚饗附録大監蘆川老隠幽嵓尊祖事實福州福清縣幽嵓院行者啓通等右啓通等今在常州武進縣張祕丞處將錢貮拾貫文銅錢玖拾㭍陌欲買田地逐年收地利捨入幽嵓院作女弟子張九娘疏奉為外翁秀才劉四郎外婆張三十四娘亡妣劉二十九娘忌辰供僧表白今先交領得銅錢壹拾貫文玖拾㭍陌其餘錢别支撥前去兼托劉立之秀才勾當今立交領文字為憑謹狀熙寧捌年拾貮月某日福州福清縣幽嵓院行者啓通押狀右同領錢肯習押祖少師文靖公手澤判押九娘收此照㑹更將此批與十伯處可取拾貫文九十七陌添與此人且先附信去要添置田地收利入幽嵓廿三日押祭祖母彭城郡夫人劉氏墓文昔我先祖未取科第於時夫人始作之配儒生窮愁想見中饋逮生多男室則已繼同穴送終是為林氏宜夫人宅獨厝兹地荒山深林樵牧不至歴數十載父老不記有孫爰歸發其久翳聞諸里閭歎息出涕生雖不享死亦子貴彭城之封象服煒煒釃酒割牲用示幽賁嗚呼哀哉先祖特進始娶夫人劉氏夫人之父無男子獨産二女長則夫人次適于鄭又皆無男子也先祖既嘗力任其責𦵏外舅姑夫人之亡遂祔其次自爾應舉覓官寖以仕宦於朝不復來徃僅以田屬幽嵓俾供諱日迄今數十年矣元幹獲縁職事道過墓下翦伐荆棘掃除阡隧并得翁媪之墳祭拜焉庶㡬克成先祖之志乃刻鄙文以告後来宣和元年八月初吉孫元幹記蘆川豫章觀音觀書元幹以宣和元年三月出京師六月至鄉里十一月乃復治行得先祖特進手澤于外孫陳氏葢先祖幼養于姑家長則為其婿劉氏無男子而祖母止出一女適陳氏亦不夀今家姑暨諸父皆林夫人子也觀夫買田作供以為乆逺計不委之子孫而授之陳氏所以貽子孫慊者可見矣曽未百年寖已蕪没幸而得之自謂可以贖責也先祖塋兆在仙宗觀東有林氏子𦵏其親遽遣匠石于神道華表之前青龍左臂之上取可以為柱為礎者枚數至二百有竒輦于山南新阡旁者殆過半元幹謂鄉曲當責以義此石既鑿訟之何補第築其毁作亭數椽以為嵗時愒息之地棄已輦之石移書愧之先祖有舊屋在村落中子孫不復居今為傭耕者所舍元幹奉二代畫像於正寢擇浄人嚴香火灑掃之役使過者猶曰文靖宅也先祖凡五男子其仕宦者四獨六伯父終于布衣老妻二子雖仰食于諸父然頗為債家所窘元幹載念伯父之殁以時之不易稾𦵏蔬圃今三十年二兄不振無乃以是特卜爽塏遷之兾其孤之或興不獨平其劵也有鄉先生鄭俠介夫者年垂八十及與先祖逰元幹兒時所願見贄書及門適已抱病延入卧内歡若平生而遺言餘㫖預聞一二後數日遂哭之若有待然先是姨母寓信陽老矣元幹所未識枉道拜之悲余母早世而喜元幹長大也為留數日葢余母亡時元幹方丱角既至里中宰木雖拱門墻缺然周覽流涕凡所以為觀美者心固欲之而力有未及也不能已已于是繚山以垣加植松栢掲氏號于門庶别它墳焉元幹平生坎􅇄屢遘手足之釁去家時僅存一弟甫三嵗又夭折異日亦有未𦵏者歸其骨並瘞之是行也既得劉氏三塚治完之且獲是書以傳于家則窮年奔走亦復何憾因録可訓子孫者二年正月十四日豫章郡觀音觀書宣政間名賢題跋掃除先逺之丘墓掇拾祖宗之手澤真子孫職也而又能以文字翰墨發明之仲宗之扵是舉也扵是為得矣退之稱歐陽詹慈孝最隆其為文章善自稱道吾扵仲宗亦云宣和二年二月廿七日豫章洪芻駒父書張侯仲宗近作殊有老成之風無復少年書生氣適閩越數千里及見大父時客非獨手澤存焉掃劉夫人冡不忘其本也東湖居士書為士而能尊其祖為子而能幹父之蠱此可乆之習也辭采燦然足以有譽于世矣宣和庚子陳瓘書于廬山之南知士無難得其用心斯知之矣今仲宗得大父手澤數言于亂紙中遂嚴飾而藏之以詒子孫此其用心必且淬礪其質追琢其章以發揚幽光詎肯失其本心以貽前人羞乎君子以是賢之宣和庚子建安㳺酢書文章可以感人非有本者不能也仲宗去親庭適數千里外見于行事皆忠厚悃愊與世之㳺子異矣故其自叙使人讀之慨然増丘壠之念宣和壬寅劉路書余崇寜間與安道少卿同仕于鄴公餘把酒以詩相屬時仲宗年未及冠徃來屏間亦與坐客賡唱初若不經意而辭藻可觀莫不駭其敏悟安道既入朝其後數年余亦歸自河朔再㑹于京師仲宗事業日進又數年復見之則已卓然為成材矣葢其天資夙成素有以過人也至於竭力松楸克勤祀享篤于禮義孝愛之道所謂文質彬彬者歟此又可嘉也于是乎書廬陵歐陽懋仲宗昔予太學同舎郎嘗裒其亡友唐慤生詩帖軸而藏之褾飾燦然如諛達人貴公得氣時予嘗書之嘉其朋友之義今又書此以見其為人子孫之孝宣和五年五月晦仙井何㮚文縝題榘文度同觀昔馬少㳺願為郡掾吏意在墳墓笑伏波有大志人志固不同也至伏波在壺頭乃始念其語少㳺幾近本哉仲宗諸父皆顯用于時武部以乆次求本郡將行復㽞士大夫一出而難返如此頼仲宗及為小官時周旋荒逺補所闕遺了堂先生推言幹蠱之義善矣舉斯而言吾家季父得奉使鄉部十年嵗時輒至山林豈非私室之幸邪宣和甲辰中秋五峯翁挺謹題世之人處父子兄弟間有厚有薄其有厚者非真能孝友也施報不一意慮為變出於有激云爾然則如之何而可曰惟無所薄者為能有厚也觀仲宗之所立則古人之意得矣宣和五年六月二日吕本中書仲宗隆于慈孝盖天性然也茍其本立矣則積而為事業發而為詞章豈復有二道哉有徳者必有言其仲宗之謂乎宣和六年四月九日趙郡蘇庠書仲宗諸父皆特進公繼室林夫人之子俱非劉氏出也其子孫聲容葢未嘗相接觀公付委陳氏之意所以望其子孫其責亦輕矣仲宗得其手澤乃訪尋于丘荒蓁莽之間割牲釃酒以致其誠意又為文刻石以表識之其于尊祖追逺之義盡矣吾將見其流風所被使鄉邦民徳歸厚必自兹始也宣和甲辰四月辛亥龜山楊時書仲宗尊祖追逺之志叙事記乆之文余不復贊其贈言皆百世之士後之觀仲宗者可以知其為人矣宣和甲辰四月六日鄱陽汪藻書予曩與安道少卿逰聞仲宗有聲庠序間藉甚恨未之識今年春仲宗還自閩中訪予梁谿之濵聴其言鯁亮而可喜誦其文清新而不羣予洒然異之然未敢以是知仲宗者士之難知乆矣富於文而實未必稱敏于言而行未必副曷敢輕許人哉别未幾仲宗復貽書勤勤以其大父手澤諸公所䟦示予且求一言夫學士大夫則知尊祖矣君子篤于親則民興于仁推是心以徃所以稱其文而副其言者率如是古人不難到也在仲宗勉之而已宣和甲辰孟夏晦李綱伯紀書後四年嵗在戊申仲冬既望李維仲輔李經叔易同觀于梁谿拙軒時季言如義興未還買田飯僧眷眷于冢間之餒魄特進公加人一等矣仲宗之文忠厚惻怛叙事條鬯葢其孝友淵源所從來逺也宣和甲辰九月旦日王以寜書宣和六年十月廿八日劉安世嘗觀銍與仲宗㳺且十五六年得其治性修身求師尚友之道有軼於羣公所稱者若夫懐念祖徳俾發聞於人特其盛徳之一爾宣和七年二月丙午汝陰王銍書仲宗以行義之美成于事親溢于先祖訪之故老得其祖布衣時前夫人劉氏之墓表而出之以示後昆嚮非仲宗之孝愛格於幽明儻故老之不存文字之泯没無所考據則劉夫人之冢長翳草棘間矣豈不悲哉古今文人撰著甚衆使人讀之或至太息流涕者以忠孝之實存焉爾仲宗于其祖夫人之文也豈不然哉眉山蘇迨書余頃未交仲宗先伯氏景方趣使交焉然此時但見仲宗詩文蔚然可愛固已恨得交之晚乃今復以懿行見信于當世賢士大夫則余曩日之所以愛仲宗者殆誤矣孰謂先伯氏平生取友止于文詞間哉因是又使人追念賢兄而流涕也譙郡張棫書仲宗平昔負絶俗之文今又見髙世之行羣公贈言足以不朽矣顧予何足以進之强為題䟦云宣和乙巳中秋後二日山隂李光近世士大夫有捨其父祖而惟外氏之尊憑藉其名聲權勢而致位貴顯者視張子此事真可嘉矣靖康改元七月十四日眉山任申先仲宗之用心與見于行事者每有過人非獨此事也所與逰皆一時名人勝士可謂行不負於幽顯矣而云云者猶不止嗚呼斯其所以為賢歟建炎二年十一月十七日江端友永福張仲宗國士也忠厚足以勸薄俗義風可以勵浮淺至于純孝錫類追逺奉先出于天性生資又何疑焉逝者果有知乎葢不可考然車過三歩腹痛勿恠豈獨為一時戯笑之言邪睢陽王浚明書陳晉之夢得其六世外祖鄭氏故塋於荒榛野蔓間嵗既踰百烝嘗弗墜殿撰張公深道作詩以紀異有云莫言伯道無兒嗣看取千秋祀事存兩公皆閩之君子也今殿撰公之猶子元幹仲宗所立復如此諸老先生又從而嘉歎之誠可以風薄俗云李易謹題紹興二年人日說者每嘆近世無忠臣非無也求之于孝子之門則必有足觀者仲宗幹蠱之譽書于廬山之南而梁谿之濵且勉之使推是心以徃異時移以事上將見憂君之憂無適而非忠也紹興壬子正月二十八日里人辛炳掃祖母之松楸寳大父之手澤省母黨謁鄉先生通有無于伯仲而𦵏其亡老此士人所當為况仲宗之賢乎盖仲宗宦逰四方時適歸焉不以能為之為難而以得為之為幸此記事之文所以作也若以仲宗為非劉氏所出之孫乃能切切如此便加贊美一何待仲宗之薄邪一種天地豈有先後之間乎仲宗上塚時諸父各列于朝不能即歸仲宗乃幹父之蠱爾了翁之言可謂句中具眼夫了翁百世師也下視時輩如黄茅白葦耳幹蠱之語豈輕以予人仲宗于是為賢紹興二年人日栟櫚鄧肅志宏士而尊祖所當為也今之學者類喜近名而不知為所當為于吾仲宗不得無愧劉殷少孝于祖母神賜之粟七年仲宗行老矣而方諱窮造物其終報之耶筠溪李彌遜書仲宗孝愛忠厚之意見于筆墨之間盖不獨文字妙當世也表章仲宗尊祖之義者其人徃徃余所欣慕亦足以見仲宗所與逰多天下長者也新安朱松紹興壬戌十月七日觀于連江玉泉寺上方觀仲宗此文感念洛陽松楸未知拜掃之日不覺涕泗横集乃知此文之傳足以勸夫為人之孫者三復歎仰紹興癸亥二月卄二日洛陽富直柔題紹興癸亥仲春晦仲宗出此軸相示并得熟讀諸公䟦語所以贊美仲宗尊祖篤親之意既詳且盡不可以有加矣復何言哉歎仰之餘因書其後延平葉份仲宗用心如此而所推許者皆一時名人可以厚風俗矣紹興癸亥六月旦觀于福唐東野亭石林葉夢得欽臣幼侍先君提舉宦逰每見好古書畫心竊憙之時或展玩欽臣必走膝下癡問先君以其不好弄亦深愛之一日發篋得數紙墨刻意若不懌謂欽臣曰此吾家判監幽嵓尊祖事蘆川刻本于閩余欲歸未能也欽臣雖獲記其言未悟其意父殁數年弟兄三人偕仕欽臣不知何從得此舊藏念欲裒而為一食貧未暇今南安倅清臣家兄曩丞吴江得黄文昌書三髙詞刻石埀虹欽臣假令武攸得胡忠簡子提刑公示及賀新郎二詞真蹟諸賢見之叙述稱嘉謹已模本成帙欽臣承乏潜川併以家集鋟梓信臣弟待次京局實司之因誦甲戌自贊而知蘆川初度之年在辛未誦上陳侍郎詩序而知掛冠之年甫四十一揮麈録所載亦復叙收凡詞翰可無遺逸矣獨幽嵓孝慕一節人未知之者欽臣固欲成先君之志以所藏閩中石刻并刋嵗月因循復恐志大心勞遽然難就敬玩題䟦皆宣政間偉人葢以其尊祖譽蠱稱不特美其詞翰也今蘆川歸𦵏閩之螺山先君昆仲三人二居華亭叔父知縣歸閩其後未有顯者都運寺正叔父之後巽臣師臣二兄未脫選而殂渙臣兄自太學登科止于一尉益臣弟今已升舎奏平請舉該免且丁家棘欽臣兄弟將欲拜掃松楸如蘆川祀祖母劉夫人之墳收伯叔兄弟之𦵏華亭葺屋俱未効其髣髴謹以幽嵓顛末及名賢䟦語附于文集目曰幽嵓尊祖録此亦蘆川所書以傳子孫使知有尊祖之誼云嘉定己夘孟冬孫通直郎知於潜縣欽臣敬書于縣齋衮繡堂
