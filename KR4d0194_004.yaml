  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0194_WYG_004-1a, image: WYG1136/WYG1136-0611c.png}
body:
  text: 蘆川歸來集卷四宋張元幹撰五言絶句龍眠墨梅江南一枝春歲久暗香滅怪得深夜寒荒村映殘雪歲寒三友圖蒼官森古鬛此君挺剛節中有調鼎姿獨立傲霜雪墨菊老眼驚花暗斜枝落紙愁晚來聞冷雨幻出一籬秋六言絶句次韻王性之題篠叢枯木犖確有岱華勢輪囷無斤斧痕我來翻君古錦老眼洗盡眵昏七言絶句上平江陳侍郎十絶并序先生儒門老尊宿也立朝行已三十年間堅忍對峙略不退轉直與古人爭衡自有清議不復贊歎頃在宣和庚子年獲拜先生於南康留山中者久之䝉跋大父手澤某佩服訓誨自知無用辛亥休官忽忽二十九載行年七十矣日暮塗逺恐懼失墜輒追記平昔所得先生話言裁為十絶句書以獻於蘇州使君待制公克肖以是謹守一家法庶幾流傳不泯俾天下後世尊其所聞常仰之如泰山北斗則小子與有榮焉了堂先生古遺直貶剝私史専尊堯二蔡懷姦首首一作力排擊始終大節不同朝灼見禍機寧有死剖心立敵肯忘言向來逆料無遺恨徹底孤忠抱至寃前賢一節皆名世此道終身公獨行每見遺編須掩泣晚生期不負先生南荒百謫愈不屈便道忽聞天遣來峩帽焚香姑拱立果無片楮可成災此事實親得於先生其說如此酒酣怒髮上衝冠四十年前廬阜南杖履周旋痛開警為言小子頗嘗參英靈精爽平生話尚記先生苜蓿槃仙去星辰終不滅至今夢想骨毛寒功名啐啄與時同譬似青天白日中不覺片雲隨雨雹適從何處運神通先生嘗云丈夫建立功名要當坐進此道常佩了堂一則語睢陽舉似劉潞州大期不復見丙午二老信然成古丘先生嘗委逹意於器之待制劉公云先生許可能尊祖詞采今存幹蠱身碑版燦然埀世譽要知忠肅有門人傷心頃拜公牀下一氣飄零餘幾人七十衰翁誰信及話言端欲廣書紳甲戌正月十四日書所見來日驚蟄節老去何堪節物催放燈中夜忽奔雷一聲大震龍蛇起蚯蚓蝦䗫也出來走筆次廷藻韻二絶風雨聲中過半春泥深郊水阻遊人老夫不出渾閒事但覺年來白髮新小蘇一物絶風流竹杖芒鞋愛討幽招隱歸來吐佳句何時一笑共重遊髙尚居士卜室髙垣桑柘邉空中來往盡飛仙似聞一舉三千里更待成功上九天往在澶淵過我家自憐凡骨走天涯丹青始識先生面㸃化何時一粒砂祖頴漕使希道使君以絶句相酬答聊成二章解嘲併發一笑從渠冷蘂籬邉少未放浮蛆甕面空髙燭幾時催夜飲隔簾度曲也英雄薰爐玉暖雲生岫曉鑑鸞窺翠掃空未許尊前聽金縷兩公新句漫爭雄次韻奉送李季言四首向來敵帥窺吳越穩泛樓船捨騎兵開闢所無顚倒事可能今日獨橫行藩鎮各傳新號令山河那復舊提封歸時賸語騎鯨老堅卧無如澗底松幾年脫迹冠冕窟一味偷生兵火中不見君家好兄弟何人憐我最竒窮我輩避讒過避賊此行能飽即須歸山川久有真消息世上從渠間是非范才元道中雜興遐想吳門人姓梅髙蹤千古共徘徊橘中儻有商山樂不必胡僧問劫灰山晚江寒春雨踈比來消息定何如竹輿行倦異鄉縣賴得金樓引睡書底處煙林飛伯勞春生詩思賸搖毫歸來凖擬扶頭醉日射花梢三丈髙君家鼻祖大范老氣壓賀蘭威鳯鳴文采風流今未泯耳孫胸次似氷清名姓未能隨老變政須卜宅近前峯看君决䇿上封事攬取竒勳銘鼎鐘圓通秀禪師送遜公首座赴明水請元豐二年也遜乃閩清黃氏子卷衲和雲離五老𣲖分三峽濟臨川興波作浪從風鼓莫學世流空度緣伽陀二首送了可首座歸四明淨因曾識楷山東擔板因緣古佛風後代兒孫仰孤硬能超五位見芙蓉問訊天童今老子偶同庚甲事如何他時要向山中去容我一菴遮薜蘿病起枕上口占三絶句奉呈公實嶠之賢伯仲一笑天上寶囊無盡藏向來密賜被先王自憐門下老賓客燕寢飽曾聞妙香素馨茉莉及玫瑰清馥渾同雪裏梅六入不分初病起眼前缺此共裴回海外緑洋來萬里齊驅黎母鷓鴣斑肯分種種篋中富不用公家金博山題忠上人墨梅寒梢的皪㸃昏鴉雪後風前皎月華結習未除羞老眼更看淡墨幻空花岷山萬松圖疊嶂連娟入翠微喬松蔽日有孫枝江流不盡松聲逺雲棧行人力困時江梅密雪飛花萬木僵南枝的皪待朝陽還知百果輸先手政為孤根壓衆芳菊秋風著意菊叢黃不怕東籬五夜霜曾記南陽飲潭水要令道骨合仙方桂井移根一户蟾光溢分派銀河地􅎃靈定與蘇仙雙橘井他年續入酈元經艅艎齊人間日日有風波不繫虛舟奈若何袖取平生濟川手行藏終與爾同科麥秋亭東坡喜雨事如此吾舅名亭思不羣不問兩岐何許秀且看十頃卷黃雲題獨愛軒此君風味極不淺户外俗人來未曾老石寒藤同一笑我知公是在家僧寄題悠然閣三絶句林端結閣小躋攀四面嵐光繞曲欄佛法本來南北異箇中北望見南山此閣面北却有南山景登臨巧處屬僧家隨分生涯度歲華莫待藤蘿滿山月時來倚杖數昏鴉誰標此閣作悠然萬事無非信手拈參得東籬把菊意不妨老逺引陶潛跋趙唐卿所藏訪戴圖萬壑千巖一剡溪漫天雲凍雪風飛人蹤鳥跡俱沉絶獨有扁舟興盡歸王孫胸次足丘壑幻出山隂訪戴圖草屋柴扉閉風雨客來空去得知無跋東坡木石玉局老仙天下人平生愛與石傳神長江絶島風濤裏千古常令墨色新題六代祖師畫像一葦浮江雙履歸花開震旦共傳衣本來心印無文字畫到盧能足是非吕公像巾裹唐裝本布衣平生唯識一鍾離此中養得嬰兒就世上行尸有許悲秋空一劒嶽陽樓醉裏乾坤日夜浮五百年間興廢事不知誰是赤松游瀟湘圖落日孤烟過洞庭黃陵祠畔白蘋汀欲知萬里蒼梧眼淚盡君山一㸃青按此詩據艇齊詩話增
