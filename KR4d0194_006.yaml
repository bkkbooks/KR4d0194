body:
  text: 蘆川歸來集巻六宋張元幹撰詞南歌子中秋涼月今宵滿晴空萬里寛素娥應念老夫閑特地中秋着意照人間香霧雲鬟濕清輝玉臂寒休教凝佇向更䦨飄下桂花開早大家㸔前調逺樹㽞殘雪寒江照晚晴分明江上數峯青倚檻舊愁新恨一時生春意來無際歸舟去有程道人元自沒心情楚夢只因沈醉等閑成前調秋夜懐歸玉露團寒菊秋風入敗荷繚牆南畔曲池渦天迥遥岑倒影落層波月轉簷牙短更傳漏箭多醉來歸去意如何只為地偏心逺慣絃歌前調桂魄芬餘暈檀香破紫心髙鬟鬆綰鬢雲侵又被蘭膏香染色沈沈指印纎纎粉釵横隠隠金更䦨雲雨鳯帷深長是枕前不見殢人尋卜算子梅的皪數枝斜氷雪縈餘態燭外尊前滿眼春風味年年在老去惜花深醉裏愁無賴冷蕊孤芳底䖏愁少箇人兒戴前調凉氣入熏籠暗影欹花砌紫玉誰人三㺯寒吹斷江梅意花底濕春衣隔坐風輕遞却笑笙簫緱嶺人明月偷埀淚前調風露濕行雲沙水迷歸艇臥㸔明河月滿空斗挂蒼山頂萬古只青天多事悲人境起舞聞雞酒未醒潮落秋江冷前調芳信㸔寒梢影入花光畫玉立風前萬里春雪豔江天夜誰折暗香來故把新篘㵼記得偎人並照時鬢亂斜枝惹浣溪沙夜坐曲室明牕燭吐光瓦爐灰煖炷飄香夜䦨茗椀間飛觴坐穏蒲團慿棐几熏餘紙帳掩藜床箇中風味更難㤀前調一枕秋風兩䖏凉雨聲初歇漏聲長池塘零落藕花香歸夢等閑歸燕去斷腸分付斷雲行畫屏今夜更思量前調王仲時席上賦木樨翡翠釵頭綴玉蟲秋蟾飄下廣寒宫數枝金粟露華濃花底清歌生皓齒燭邉疎影映酥胷惱人風味冷香中前調武林送李似表燕掠風檣欵欵飛艷桃濃李鬧長堤騎鯨人去曉鶯啼可意湖山留我住斷腸煙水送君歸三春不是别離時前調夏日雨後漫興雲氣吞江巻夕陽白頭波浪電飛忙奔雷驚雨濺胡床玉節故人同壯觀錦囊公子更平章榕隂歸夢十分凉前調山繞平湖波撼城湖光倒影浸山青水晶樓下欲三更霧栁暗時雲度月露荷翻䖏水流螢蕭蕭散髪到天明前調目送歸舟鐡甕城隔江想見蜀山青風前團扇僕頻更夢裏有時身化鶴人間無數草為螢此時山月下樓明前調薔薇水月轉花枝清影踈露華濃䖏滴真珠天香遺恨罥花鬚沐出烏雲多態度暈成蛾緑費工夫歸時分付與妝梳前調篤耨香花氣天然百和芬仙風吹過海中春龍涎沈水摠銷魂清潤巧縈金縷細氤氲偏傍玉肌温别來長是惜餘薫前調范才元自釀色香並妙直與緑萼梅同調宛然京洛氣味也因名曰萼緑春且作一首萼緑華家萼緑春山瓶何䖏下青雲濃香氣味已醺人竹葉傳杯驚老眼松醪題賦倒綸巾須防銀字暖朱唇前調戲簡宇文徳和求拈香花氣蒸濃古鼎煙水沉春透露華鮮心清無暇數龍涎乞與病夫僧帳座不妨公子醉茵眠普薫三界埽塵縁前調求年例貢餘香花氣薫人百和香少陵佳句是仙方空教蜂蝶為花忙和露摘來輕換骨傍懐聞處惱迴腸去年時候入思量前調殘臈晴寒出衆芳風流勾引破春光年年長為此花忙夜乆莫教銀燭灺酒邉何似玉臺粧氷肌温䖏覓餘香前調棐几明牕樂未央薰爐茗椀是家常客來長揖對胡床蟹眼湯深輕泛乳龍涎灰煖細烘香為君行草寫秋陽前調書大同驛壁榕葉桄榔驛枕谿海風吹斷瘴雲低薄寒初覺到征衣嵗晚可堪歸夢逺愁深偏恨得書稀荒庭日脚又埀西栁梢青海山浮碧細風絲雨新愁如織慵試春衫不禁宿酒天涯寒食歸期莫數芳辰誤幾度囘廊夜色入户飛花隔簾雙燕有誰知得前調小樓南陌翠軿金勒誰家春色冷雨吹花禁煙怯栁傷心行客少年百萬呼盧擁越女吳姬共擲被底香濃樽前燭滅如今消得醉花隂紫樞澤笏趨龍尾平入鈞衡位春殿聴宣麻争喜登庸何似今畨喜崑臺宜有神仙裔奕世貂蟬貴玉砌長蘭芽好擁笙歌長向花前醉前調春日思歸翠箔隂隂籠畫閣昨夜東風惡芳徑滿香泥南陌東郊惆悵妨行樂傷春比似年時惡潘鬢新來薄何䖏不禁愁雨滴花腮和涙臙脂落長相思香暖幃玉暖肌嬌卧嗔人來睡遲印殘雙黛眉蟲聲低漏聲稀驚枕初醒燈暗時夢歸人未歸前調感別花下愁月下愁花落月明人在樓斷腸春復秋從他休任他休如今青鸞不自由㸔㸔天盡頭如夢令七夕雨洗青冥風露雲外雙星初度乞巧夜樓空月妬囘廊私語凝佇凝佇不似去年情緒前調潮退江南晚渡山闇水西烟雨天氣十分凉斷送一年殘暑歸去歸去香霧曲屏深䖏前調臥㸔西湖烟渚緑盖紅粧無數簾捲曲欄風拂面荷香吹雨歸去歸去笑損花邉鷗鷺春光好踈雨洗細風吹淡黄時不分小亭芳草緑映簷低樓下十二層梯日長影裏鶯啼倚遍䦨干㸔盡栁憶腰肢前調吳綾窄藕絲重一鈎紅翠被眠時要人煖著懐中六幅裙窣輕風見人遮盡行蹤正是踏青天氣好憶弓弓虞美人開殘桃李春方到誰送東風早搘藜幽徑踏餘花却對緑隂青子問年華迢迢雲水横清淺不遣愁眉展數竿修竹自横斜猶有小牕朱戸似儂家青玉案讌趙端禮堂成華裾玉轡青絲鞚記年少金吾從花底朝囬珠翠擁曉鐘初斷宿酲猶殢緑鏁牕中夢天涯相遇鞭鸞鳯去去堂成更情重月轉簷牙雲遶棟凉吹香霧酒迷歌扇春笋傳杯送前調再和王孫陌上春風鞚蘂珠宴雲軿從歸去笙歌常醉擁蠟殘花炬月侵氷簟慣作凉堂夢玉人勸客釵斜鳯條脱擎杯腕嫌重燕子入簾飛畫棟雨餘深院漏催清夜更軋秦筝送前調生朝花王獨占春風逺㸔百卉芳菲遍五福長隨今日宴粉光生艷寶香飄霧方響流蘇顫夀祺堂上修篁畔乳燕雙雙賀新院玉斚明年何䖏勸旌幢滿路貂蟬宜面歸覲黄金殿前調筠翁生朝水芝香逺揺紅影泛瑞靄横山頂縹緲笙歌雲不定玉鈎斜挂素蟾初滿醉愜浮𤓰冷庭蘭戲綵𫝊金鼎小䄂青衫更輝映誰道筠溪歸計近秋風催去鳯池難老長把中書印前調生朝銀潢露洗氷輪皎謫仙下蓬莱島簾捲横山珠翠繞生朝香霧玳筵絲管長醉壺天曉金鑾夜鏁麻新草入輔明光拜元老㸔取明年人總道中興賢相太平時世分外風光好前調月華冷沁花梢露芳意戀香肌住心字龍涎饒濟楚素馨風味碎瓊流品别有天然䖏圍爐屈曲宜深炷留取春光向朱户緑綺聲中誰暗許小牕歸去夢囘猶記金鼎分雲縷前調賀方囘所作世間和韻者多矣余經行松江何啻百囘念欲下一轉語了無好懐此來偶有得當與吾宗椿老輩載酒浩歌西湖南山間寫我帶思公等不可不入社也平生百繞埀虹路㸔萬頃翻雲去山澹夕暉帆影度菱歌風斷襪羅塵散總是闗情䖏少年陳迹今遲暮走筆猶能醉時句花底目成心暗許舊家春事覺來客恨分付踈篷雨㸃絳唇丙寅秋社前一日溪光亭大雨作山暗秋雲暝鴉接翅啼榕樹故人何䖏一夜溪亭雨夢入新凉只道消殘暑還知否燕將雛去又是流年度前調送別水驛凝霜夜帆風駛潮生曉酒醒寒峭枕底波聲小好去歸舟有箇人風調君行了此歡應少索共梅花笑前調春曉輕雷采蘋洲上清明雨亂雲遮樹黯澹江村路今夜歸舟緑潤紅香䖏遥山暮畫樓何許喚取潮囘去前調畵閣深圍煖紅光裏芳林影暗香成陣上下花相映倒挂踈枝月落參横冷休裝景要人酒醒除是花枝並前調生朝嵩洛雲煙間生真相耆英裔要知鮐背難老中和氣報道玉堂已草調元制華夷喜繡裳貂珥便向東山起前調呈洛濵筠谿二老清夜沈沈暗蛩啼䖏簷花落乍凉簾幙香遶屏山角堪恨歸鴻情似秋雲薄書難托儘教寂寞忘了前時約前調醉泛吳淞小舟誰怕東風大舊時經過曽向埀虹臥月淡霜天今夜空清坐還知麽滿斟髙和只有君知我前調減塑冠兒寳釵金縷雙緌結怎教寜帖眼兒惱裏劣韻底人人天與多磨折休分説放燈時節閑了花和月前調水鷁風帆兩眉只解相思皺悄然難受教我怎唧溜待得書來不管歸時瘦嬌癡後是事撋就只這難依口虞美人廣寒蟾影開雲路目斷愁來䖏菊花輕泛玉盃空醉後不知星斗亂西東今宵入夢陽䑓雨誰忍先歸去酒醒長是五更鐘休念舊逰吹帽幾秋風前調西郊追賞尋芳䖏聞道衝寒去雨肥紅綻向南枝嵗晚纔開應是恨春遲天涯樂事王孫貴花底還須醉有人風味勝踈梅醉裏折花歸去更傳杯前調菊坡九日登髙路往事知何處陵遷谷變總成空囘首十年秋思吹䑓東西牕一夜蕭蕭雨夢繞中原去覺來依舊畵樓鐘不道木樨香撼海山風漁家傲題元真子圖釣笠披雲青嶂繞橛頭雨細春江渺白鳥飛來風滿棹收綸了漁童拍手樵青笑明月太虚同一照浮家泛宅㤀昏曉醉眼冷㸔城市鬧烟波老誰能惹得閑煩惱苕溪漁隠云張仲宗有漁家傲詞余往嵗在錢塘與仲宗従㳺甚乆仲宗手冩此詞相示云舊所作也其詞第二句元是橛頭雨細春江渺余謂仲宗曰橛頭雖是船名今以雨襯之語晦而病因為改作緑簔雨細仲宗笑以為然前調樓外天寒山欲暮溪邉雪靄藏雲樹小艇風斜沙嘴露流年度春光已向梅梢住短夢今宵還到否葦村四望知何䖏客裏從來無意緒催歸去故園正要鶯花主前調奉陪富公季申探梅有作寒食西郊湖畔路天低野濶山無數路轉岡斜花滿樹絲吹雨南枝占得春光住藉草携壺花底去花飛酒面香浮處老手調羮當獨歩須記取坐中都是芳菲侶謁金門或刻秦處度鴛鴦渚春漲一江花雨别岸數聲初過櫓晚風生碧樹艇子相呼相語載取暮愁歸去寒食烟村芳草路愁來無著處前調道山亭餞張椿老赴行在風露底石上岸巾愁起月到房心天似水亂峰清影裏此去登瀛須記今夕道山同醉春殿明年人共指玉皇香案吏前調送康伯檜清光溢影轉畵簷凉入風露一天星斗濕無雲天更碧滿引送君何惜記取吾曹今夕目斷秋江君到日潮來風正急瑞鷓鴣雛鶯初囀鬭尖新雙蕋花嬌掌上身總解滿斟偏勸客多生俱是綺羅人囘波偷顧輕招拍方響低敲更合筝荳蔲梢頭春欲透情知巫峽待為雲前調彭徳器出示胡邦衡新句次韻白衣蒼狗變浮雲千古功名一聚塵好是悲歌將進酒不妨同賦惜餘春風光全似中原日臭味要須我輩人雨後飛花知底數醉來贏取自由身好事近老去更思歸芳草正薫南陌上已又逢寒食歎三年為客吹花小雨濕秋千閒却好春色天甚不憐人老早教人歸得前調梅潤乍晴天簾捲畵堂風月珠翠共迷香霧是長年時節瑶池清夜宴羣仙鸞笙未吹徹西母醉中㣲笑看蟠桃初結前調春色到花房芳信一枝偏好勾引萬紅千翠為化工呈巧花姑玉貌笑東風今朝放春早㸔取鬢邉幡勝永宜春難老前調斗帳炷爐薫花露裛成薌澤縈透雪兒金縷醉玉壺春色非煙非霧鏁牕中王孫倦逰客不道粉墻南畔也有人聞得怨王孫海棠小院春晝晴牕霞透着雨臙脂倚風翠袖芳意惱亂人多暖金荷多情不分羣葩後傷春瘦淺黛眉尖秀紅潮醉臉半掩花底重門怨黄昏前調紹興乙丑春二月既望李文中置酒溪閣日暮雨過盡得雲烟變態如對營丘著色山坐客有歌怨王孫者請予賦其情抱葉子謙為作三弄吹雲裂石旁若無人永福前此所未見也老子於此興復不淺霽雨天迥平林煙暝燈閃沙汀水生釣艇樓外栁暗誰家亂昏鴉相思怪得今畨甚寒食近小砑魚牋信屏山半掩㣲醉獨倚䦨干恨春寒喜遷鶯令送何晉之大著兄趨朝歌以侑酒文倚馬筆如椽桂殿蚤登仙舊遊冊府記當年衮繡合貂蟬慶天申瞻玉座鵷鷺正陪班㸔君穏歩過花甎歸院引金蓮鶴冲天呈富樞宻令向亦作喜遷鶯誤雲葉亂月華光羅幕捲新凉玉醅初泛嫩鵞黄花露滴秋香地行仙天上相風度世間人様懸知洗盞徑開甞誰醉伴禪床喜遷鶯慢鹿鳴宴作雁塔題名寶津朌宴盛事簮紳常説文物昭融聖代搜羅千里争趨丹闕元侯勸駕鄉老獻書發軔龜前列山川秀圜觀衆多無如閩越豪傑姓標紅紙帖報泥金春信歸來俱捷驕馬蘆鞭醉埀藍綬吹雪芳原闕二字月素娥情厚桂花一任郎君折須滿引南䑓又是合沙時節鷓鴣天不怕㣲霜㸃玉肌恨無流水照氷姿與君着意從頭看初見東南第一枝人散後雪晴時隴頭春色寄來遲使君本是花前客莫怪殷勤為賦詩憶秦娥桃花萼雨肥紅綻東風惡東風惡長亭無寐短書難托征衫辜負深閨約禁煙時候春羅薄多應消瘦可忺梳掠
