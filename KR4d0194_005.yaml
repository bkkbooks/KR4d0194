body:
  text: 蘆川歸來集卷五宋張元幹撰詞賀新郎送胡邦衡待制赴新州夢繞神州路悵秋風連營畫角故宫離黍底事崑崙傾砥柱九地黃流亂注聚萬落千村狐天意從來髙莫問況人情老易悲難訴更南浦送君去涼生岸柳催殘暑耿斜河踈星淡月斷雲微度一作雨萬里江山知何處回首對床夜語雁不到書成誰與目盡青天懷今古肯兒曹恩怨相爾汝舉大白唱金縷前調寄李伯紀丞相曳杖危樓去斗埀天滄波萬頃月流煙渚掃盡浮雲風不定未放扁舟夜渡宿雁落寒蘆深處悵望關河空弔影正人間鼻息鳴鼉鼓誰伴我醉中舞十年一夢揚州路倚髙寒愁生故國淚濺禾黍要斬樓蘭三尺劔遺恨琵琶舊語漫暗澀一作拭銅華塵土喚取謫仙平章看過苕溪尚許垂綸否風浩蕩欲飛一作輕舉滿江紅自豫章阻風吳城山作春水迷天桃花浪幾番風惡雲乍起逺山遮盡晚風還作緑卷芳洲生杜若數帆帶雨煙中落傍向來沙嘴共停橈傷飄泊寒猶在衾偏薄腸欲斷愁難著倚篷窗無寐引杯孤酌寒食清明都過却最憐輕負年時約想小樓終日望歸舟人如削蘭陵王春恨卷珠箔朝雨輕陰乍閣闌干外煙桞弄晴芳草侵階映紅藥東風妬花惡吹落梢一作枝頭嫩萼屏山掩沉水倦熏中酒心情怕杯勺尋思舊京洛正年少踈狂歌笑迷著障泥油壁催梳掠曽馳道同載上林攜手燈夜初過早共約又爭信飄泊寂寞念行樂甚粉淡衣襟音斷絃索瓊枝璧月春如昨悵别後華表那回雙鶴相思除是向醉裏暫忘却前調綺霞散空碧留晴向晚東風裏天氣困人時節秋千閉深院簾旌翠波颭窗影殘紅一線春光巧花臉桞腰勾引芳菲鬧鶯燕間愁費消遣想蛾緑輕暈鸞鑑新怨單衣欲試寒猶淺羞衾鳯空展塞鴻難託誰問潛寬舊帶眼念人似天逺迷戀畫堂宴看最樂王孫濃艷爭勸蘭膏寶篆春宵短擁檀板低唱玉杯重暖衆中先醉漫倚檻早夢見念奴嬌江天雨霽正露荷擎翠風槐搖緑試問秦樓今夜裏愁到闌干幾曲笑撚黃花重題紅葉無奈歸期促暮雲千里桂花初綻寒玉有誰伴我凄涼除分付與杯中醽醁水本無情山又逺回首煙波雲木夢繞西園魂飛南浦自古情難足舊遊何處落霞空映孤鶩前調丁邜上已燕集葉尚書蕊香堂賞海棠即席賦之蕊香深處逢上已生怕花飛紅雨萬點胭脂遮翠袖誰識黃昏凝佇燒燭呈籹傳杯繞檻莫放春歸去埀絲無語見人却似羞妒修禊當時今日羣賢絃管裏英姿如許寶靨羅衣應未有許多陽臺神女氣湧三山醉聽五鼓休更分今古壺中天地大家著意留住前調代洛濵次石林韻吳淞初冷記垂虹南望殘日西沉秋入青冥三萬頃蟾影吞盡湖陰玉斧為誰氷輪如許宫闕想寒深人間竒觀古今豪士悲吟蒼辨丹頰仙翁淮山風露底曽賦幽尋老去專城仍好客時擁歌吹登臨坐揖龍江舉杯相屬桂子落波心一聲猿嘯醉來虛籟千林前調題徐明叔海月吟笛圖秋風萬里湛銀潢清影氷輪寒色八月靈槎乘興去織女機邊為客山擁雞林江澄鴨緑四顧滄溟窄醉來橫吹數聲悲憤誰測飄蕩貝闕珠宫羣龍驚睡起馮夷波激雲氣蒼茫吟嘯處鼉吼鯨奔天黑回首當時蓬萊方丈好箇歸消息而今圖畫漫教千古傳得前調玩月寒綃素壁露華濃羣玉峯巒如洗明鏡池開秋水淨冷浸一天空翠荷芰波生菰蒲風動驚起魚龍戲山河影裏十分光照人世誰似老子癡頑胡牀欹坐自引壺觴醉醉裏悲歌歌未徹屋角烏飛星墜對影三人停杯一問誰解騎鯨意玉京何處翠樓空鎖十二前調己卯中秋和陳丈少卿韻埀虹望極掃太虛纎翳明河翻雪一碧天光波萬頃湧出廣寒宫闕好事浮家不辭百里俱載如花頰琴髙雙鯉鼎來同醉孤絶浩蕩今夕風煙人間天上别似尋常月陶冶三髙千古恨賞我中秋清節八十仙翁雅冝圖畫寫取橫江楫平生竒觀夢回猶竦毛髮石州慢寒水依痕春意漸回沙際煙濶溪梅晴照生香冷蕊數枝爭發天涯舊恨試看幾許消魂長亭門外山重疊不盡眼中青是愁來時節情切畫樓深閉想見東風暗消肌雪辜負枕前雲雨樽前花月心期切處更有多少凄涼殷勤留與歸時説到得再相逢恰經年離别前調己酉秋吳興舟中作雨急雲飛驚散暮鴉微弄涼月誰家踈柳低迷幾點流螢明滅夜帆風駛滿湖煙水蒼茫菰蒲零亂秋聲咽夢斷酒醒時倚危檣清絶心折長庚光怒羣盜縱橫敵人猖獗欲挽天河一洗中原膏血兩宫何處塞垣秪隔長江唾壺空擊悲歌缺萬里想龍沙泣孤臣吳越永遇樂宿鷗盟軒月仄金盆江縈羅帶涼飈天際摩詰丹青營丘平逺一望窮千里白鷗盟在黃粱夢破投老此心如水耿無眠披衣顧影乍聞繞階絡緯百年倦客三生習氣今古到頭誰是夜色蒼茫浮雲滅沒舉世方熟寐誰人著眼放神八極逸想寄塵寰外獨憑闌雞鳴日上海山霧起前調為洛濵橫山作飛觀橫空衆山繞甸江面相照曲檻披風虛簷挂月據盡登臨要有時巾屨訪公良夜坐我半天林杪攬浮丘飄飄衣𬒮相與似逰蓬島主人勝度文章英妙合住北扉西沼何事十年風灑露沐不厭江山好曲屏端有吹簫人在同倚暮雲清曉乘除了人間寵辱付之一笑八聲甘州陪筠翁小酌橫山閣倚凌空飛觀展營丘卧軸恍移時漸微雲點綴參橫斗轉野濶天埀草樹縈回島嶼杳靄數峯低共一樽明月顧影為誰俯仰乾坤今古正嫩涼生處濃露初霏據胡牀殘夜唯我與公知念老去風流未減見向來人物幾興衰身常健何妨逰戲莫問棲遲前調西湖有感寄劉睎顔記當年共飲醉畫船搖碧罥花叉問蒼顔華髮煙簔雨笠何事重來看盡人情物態冷眼只堪咍賴有西湖在洗我塵埃夜久波光山色間淡粧濃抹氷鑑雲開更潮頭千丈江海兩崔嵬曉涼生荷香撲面灑天邉風露逼襟懷誰同賞通宵無寐斜月低回水調歌頭同徐師川泛太湖舟中作落景下青嶂髙浪卷滄洲平生頗慣江海掀舞木蘭舟百二山河空壯底事中原塵漲喪亂幾時休澤畔行吟處天地一沙鷗想元龍猶髙卧百尺樓臨風酹酒堪笑談話覔封侯老去英雄不見惟與漁樵為伴回首得無憂莫道三伏熱便是五湖秋前調和薌林居士中秋閏餘有何好一歲兩中秋滕王髙閣曽醉月湧大江流今夜釣龍臺上還是當時逢閏佳句記英遊看山兼看月登閣復登樓别離久今古恨大刀頭老來常是清夢宛在舊神州遐想薌林風味甕裏自傾春色不用貫貂裘笑我成何事搔首漫私憂前調陪福帥宴集口占以授官奴縹眇九重閣壯觀在人間涼飈乍起四圍晴黛入闌干已過中秋時候便是菊花重九為壽一樽歡今古登髙意玉帳正清間引三巴連五嶺控百蠻元戎小隊舊逰曽記並龍山閩嶠尤寬南顧聞道天邉雨露持橐詔新頒且擁笙歌醉廊廟更徐還前調平日幾經過重到更留連黃塵烏帽覺來眼界忽醒然望見如雲秋稼莫問雞蟲得失鴻鵠下翩翩四海九州大何處著飛仙吸湖光吞蟾影倚天圓胸中萬頃空曠清夜炯無眠要識世間間處自有樽前深趣且唱釣魚船調鼎他年事妙手看烹鮮前調雨斷翻驚浪山暝擁歸雲麥秋天氣聊泛征棹泊江村不羡腰間金印却愛吾廬髙枕無事閉柴門搔首煙波上老去任乾坤白綸巾玉麈尾一杯春性靈陶冶我輩猶要箇中人莫變姓名吳市且向漁樵爭席與世共浮沉目送飛鴻去何用畫麒麟前調露下菱歌逺螢傍藕花流臨溪堂上望中依舊栁邉洲晚暑氷肌沾汗新浴香綿撲粉湘簟月華浮長記開朱户不寐待歸舟恍重來思往事攪離愁天涯何處未應容易此生休莫問吳霜點鬢細與蠻箋封恨相見轉綢繆雲雨陽臺夢河漢鵲橋秋前調癸酉虎丘中秋萬里氷輪滿千丈玊盤浮廣寒宫殿西望湖海冷光流掃盡長空纎翳散亂疏林清影風露迫人愁徐步行歌去危坐闕眠休問孤篷緣底事苦淹留倦逰回首向來雲卧兩星周此夜此生長好明月明年何處歸興在南州老境一傖父異縣四中秋前調贈汪秀才袖手看飛雪髙卧過殘冬飄然底事春到先我逐孤鴻挾取筆端風雨快寫胸中丘壑不肯下樊籠大笑了今古乘興便西東一樽酒知何處又相逢奴星結栁與君同送五家窮好是橘封千户正恐樓髙百尺湖海有元龍目光在牛背馬耳射東風前調今夕定何夕秋水滿東甌悲涼懷抱何事還倍去年愁萬里碧空如洗寒浸十分明月簾捲玉波流非是經年别一歲兩中秋坐中庭風露下冷颼颼素娥無語相對樽酒且遲留琴罷不堪幽怨遙想三山影外人倚夜深樓矯首望霄漢雲海路悠悠前調為趙端禮作最樂賢王子今歲好中秋夜深珠履舉杯相屬盡名流宿雨乍開銀漢洗出玉蟾秋色人在廣寒逰浩蕩山河影偏照嶽陽樓露華濃君恩重判扶頭霓旌星節已隨絲管下皇州滿座燭光花豔笑罥烏巾同醉誰問負薪裘月轉簷牙曉髙枕更無憂前調追和舉手釣鼇客削迹種瓜侯重來吳會三伏行見五湖秋耳畔風波搖蕩身外功名飄忽何路近螭頭孤負男兒志悵望故園愁夢中原揮老淚遍南州元龍湖海豪氣百尺卧髙樓短髮霜黏兩鬢清夜盆傾一雨喜聽瓦鳴溝猶有壯心在付與百川流前調罷秩後漫興放浪形骸外憔悴山澤癯倒冠落佩此心不待白髭鬚聊復脫身鵷鷺未暇先尋水竹矯首漢廷疏長夏啖丹荔兩紀傲間居忽風飄連雨打向西湖藕花深處尚能同載麴生無聽子談天舌本澆我書空胸次醉臥踏氷壺畢竟凌煙像何似輞川圖前調丁卯春與鍾離少翁張元鑒登垂虹拄策松江上舉酒酹三髙此生飄蕩往來身世兩徒勞長羡五湖煙艇好是秋風鱸鱠笠澤久蓬蒿想像英靈在千古傲雲濤俯滄波吞空曠恍神交解衣盤礴政須一笑屬吾曹洗盡人間塵土掃去胸中氷炭痛飲讀離騷縱有垂天翼何用釣連鰲前調送吕居仁召赴行在所戎馬蹂中夏星歷一周天干戈未定悲吒河洛尚顛連萬里兩宫無路政仰君王神武願數中興年吾道尊洙泗何暇議伊川吕公子三世相在凌煙詩名獨步焉用兒輩更毛箋好去承明讜論照映金絨帶穩恩與荔枝偏回首東山路池閣醉雙蓮風流子政和間過延平雙溪閣落成席上賦飛觀插雕梁􅑀虛起縹眇五雲鄉對山滴翠嵐兩眉濃黛水分雙𣲖滿眼波光曲欄外汀煙輕冉冉莎草細茫茫無數釣舟最宜煙雨有如圖畫渾似瀟湘使君行樂處秦箏弄哀怨雲鬢分行心醉一缸春色滿座凝香有天涯倦客樽前回首聽徹伊州惱損柔腸不似碧潭雙劒猶解相將魚遊春水芳洲生蘋芷宿雨收晴浮暖翠煙光如洗幾片花飛點淚清鏡空餘白髮添新恨誰傳紅綾寄溪漲岸痕浪吞沙尾老去情懷易醉十二闌干慵遍倚雙鳬人慣風流功名萬里夢想濃粧碧雲邉目斷歸帆夕陽裏何時送客更臨春水寶鼎現筠翁李似之作此詞見招因賦其事使歌之者想像風味如到山中山莊圖畫錦囊吟詠胸中丘壑年少日如虹豪氣吐鳯詞華渾忘却便袖手向巖前溪畔種滿煙梢霧籜想别墅平泉當時草木風流如昨瘦藤間倚看鋤藥雙芒鞋雨後常著目送處飛鴻滅沒誰問蓬蒿爭燕雀乍霽月望松雲南渡短艇欹沙夜泊正萬里青冥千林虛籟從渠矰繳携幼尚有筠丁誰會得人生行樂岸幘綸巾歸去深户香迷翠幕恐未免上凌煙閣好在秋天鶚念小山叢桂今宵狂客不勝杯勺祝英臺近枕霞紅叉燕墜花露殢雲髻粉淡香殘猶帶宿酲睡畫簷紅日三竿慵窺鸞鑑長是倚春風無力又經歲玉腕條脫輕鬆羞郎見憔悴何事秋來容易又分袂可堪踈雨梧桐空階絡緯背人處偷彈珠淚朝中措次聰父韻花陰如坐木蘭船風露正涓涓翠蓋匝庭芳影青蛟平地飛涎春撩狂興香迷痛飲中聖中賢攜取一枝同夢從他五夜如年蝶戀花窗暗窗明昏又曉百歲光陰老去難重少四十歸來猶賴早浮名浮利都經了時把青銅間自照華髮蒼顔一任旁人笑不會參禪并學道但知心下無煩惱前調燕去鶯來春又到花落花開幾度池塘草歌舞筵中人易老閉門打坐安間好敗意常多如意少著甚來由入鬧尋煩惱千古是非渾忘了有時獨自掀髯笑沁園春紹興丁巳五月六夜夢與一道人對歌數曲遂成此詞神水華池汞鉛凝結虎龍往來問子前午後陽銷陰長自然爐鼎何用安排靈寶玄門煙蘿真境三日庚生兊户開泥丸透盡周天火候平步仙階蓬萊直上瑶臺看海變桑田飛暮埃念塵勞良苦流光易度明珠誰得白骨成堆位極人臣功髙今古總蹈危機吞禍胎爭知我辦青鞋布襪鴈蕩天台前調漫興欹枕深軒散帙虛堂畏景屢移漸披襟臨水搘床就月蓮香拂面竹色侵衣壓玉為醪折荷當盞卧看銀潢星四垂人歸後任飢蟬自嘯宿鳥相依癡兒莫蹈危機悟三十九年多盡非任紆朱拖紫圍金佩玉青錢流地白璧如坻富貴浮雲身名零露事事無心歸便歸秋風動正吳淞月冷蓴長鱸肥臨江仙送王叔濟玉立清標消晚暑胸中一段氷壺畫船歸去醉歌姝微雲收未盡殘月炯如初鴛鷺行間催濶步秋來乘興鳬趨煩君為我問西湖不知疏影畔許我結茅無前調荼䕷有感鶯喚屏山驚睡起嬌多須要郎扶荼䕷斗帳罷薰爐翠穿珠落索香泛玉流蘇長記枕痕銷醉色日髙猶倦粧梳一枝春瘦想如初夢迷芳草路望斷素鱗書前調趙端禮重陽後一日置酒坐上賦十日籬籩猶袖手天教冷地藏香王孫風味最難忘逃禪留坐客度曲出宫粧判却為花今夜醉大家且泛鵝黃人心休更問炎涼從渠簮髮短還我引杯長前調送宇文德和被召赴行在所露坐榕陰須痛飲從渠疊鼓頻催暮山新月兩徘徊離愁秋水逺醉眼曉帆開泛宅浮家逰戲去流行坎止忘懷江邉鷗鷺莫相猜上林消息好鴻雁已歸來醉落魄浮家泛宅舊逰記霅溪縱迹此生已是天涯隔投老誰知還作三吳客故人怪我踈髯黑醉來猶似丁年日光陰未肯成虛擲蜀魄聲中著處有春色前調緑枝紅萼江南芳信年年約竹輿路轉溪橋角晴日烘香的皪踈籬落玉臺粉面鉛華薄畫堂長記深羅幕惜花老去情猶著客裏驚春生怕東風惡前調一枝氷萼鬢雲低度橫波約醉扶曽罥烏巾角長是春來腸斷寶叉落羅衣乍怯春風薄夜深花困遮垂幕不堪往事尋思著休問尊前客惡主人惡前調雲鴻影落風吹小艇欹沙泊津亭古木濃陰合一枕灘聲客睡何曽著天涯萬里情懷惡年華埀暮還離索佳人想見猜疑錯莫數歸期已負當年約
