body:
  text: 蘆川歸來集卷七宋張元幹撰詞明月逐人來燈夕趙端禮席上花迷珠翠香飄羅綺簾旌外月華如水暖紅影裏誰會王孫意最樂升平景致長記宫中五夜春風鼓吹遊仙夢輕寒半醉鳯幃未暖歸去薰濃被更問陰晴天氣小重山誰向晴窗伴素馨蘭芽初秀發紫檀心國香幽艷最情深歌白雪秖少一張琴新月冷光侵醉時花近眼莫頻斟薛濤箋上楚妃吟空凝睇歸去夢中尋上西平一作金人捧露盤卧扁舟聞寒雨數佳期又還是輕誤仙姿小樓夢冷覺來應恨我歸遲鬢雲鬆處枕檀斜露泣花枝名與利空縈繫添憔悴漫孤恓得見了説與教知偎香倚暖夜爐圍定酒溫時任他飛雪灑江天莫下層梯春光好為楊聰父侍兒切鱠作花恨雨栁嫌風客愁濃坐久霜刀飛碎雪一樽同勞煩玉指春蔥未放筯金盤已空更與箇中尋尺素兩情通前調寒食近踏青時畫堂西可是春來偏倦繡乍生兒香綿輕拂胭脂加文褓初試斑衣悄沒工夫存問我且憐伊清平樂雪晴送别亂山深處雪擁溪橋路曉日乍明催客去驚起玉鴉翻樹翠衾香暖檀灰一枝想見踈梅憑仗東風説與畫眉人共春回前調明珠翠羽小綰同心縷好去吳淞江上路寄與雙魚尺素蘭橈飛取歸來愁眉待得伊開相見嫣然一笑眼波先入郎懷菩薩蠻見芙蓉天涯客裏秋容晚妖紅聊戲思鄉眼一朵醉深粧羞渠照鬢霜開時誰斷送不待司花共有腳號陽春芳菲屬主人前調戲呈周介卿拍堤緑漲桃花水畫船穩泛東風裏絲雨濕苔錢淺寒生禁煙江山留不住却載笙歌去醉倚玉搔頭幾曽知旅愁前調三月晦送春有集坐中偶書春來春去催人老老夫爭肯輸年少醉後少年狂白髭殊未妨插花還起舞管領風光處把酒共留春莫教花笑人前調雨餘翠袖瓊膚潤一枝想像傷春困老眼見花時惜花心未衰釀成誰與醉應把流蘇綴淚沁枕囊香惱儂歸夢長前調政和壬辰東都作黃鶯啼破紗窗曉蘭缸一點窺人小春淺錦屏寒麝煤金博山夢回無處覔細雨梨花濕正是踏青時眼前偏少伊前調芳林玉蘂生香霧逰蜂爭採清晨露芳意著人濃微烘曲室中春來瀛海外沈水迎風碎好事付餘薰頻分幾縷雲樓上曲樓外夕陽明逺水樓中人倚東風裏何事有情怨别離低鬟背立君應知東望雲山君去路斷腸迢迢盡愁處明朝不忍見雲山從今休傍曲欄干前調清夜燈前花報喜心隨社燕涼風起雲路修成寶月時東樓悵望君先歸沆瀣秋香生玉井畫簷深轉梧桐影看君西去侍明光杯中丹桂一枝芳豆葉黃為伯南賦早梅復和韻冰溪踈影竹邊春翠袖天寒逈暮雲雪裏精神淡佇人隔重門寶粟生香玉半溫前調踈枝冷蘂忽驚春一點芳心入鬢雲風韻情知似玉人笑迎門香暖紅爐酒未溫前調見草堂别集輕羅團扇掩微羞酒滿玻璃花滿頭小板齊聲唱石州月如鈎一寸橫波入鬢流滿庭芳夀梁苑春歸章街雪霽栁梢華萼初萌非煙非霧新嵗樂升平京兆雍容報政金狨過九陌塵輕朝回處青霄路穩黃色起天庭東風吹緑鬢薄羅剪綵小綰流鶯比渭濵甲子尚父難兄滿泛椒觴獻夀斑衣侍雲母分屏明年會雙衣對引談笑秉鈞衡前調夀富樞密韓國殊勳洛都西內名園甲第相連當年緑鬢獨占地行仙文彩風流瑞世延朱履絲竹喧闐人皆仰一門相業心許子孫賢中興方慶會再逢甲子重數天元問千齡誰比五福俱全此去沙隄步穩調金鼎七葉貂蟬香檀緩杯傳鸚鵡新月正娟娟前調為趙西宗夀玉葉聯芳天潢分潤夀筵長對薰風間平襟度濮邸行尊崇忠孝家傳大雅無喜愠一種寬容芝蘭盛綵衣嬉戲親睦冠西宗絲綸膺重寄遙防遷美本鎮恩隆應萱堂齊福誕月仍同花蘂香濃氣暖凝瑞露滿酌金鍾龍光近星飛驛馬宣入嗣王封前調三十年來雲遊行化草鞋踏破塵沙遍參尊宿曾記到京華衲子如麻似粟誰闕笑瞿老拈花經離亂青山盡處海角又天涯今宵間打睡明朝粥飯隨分僧家把木佛燒却除是丹霞撞著門徒施主驀然箇喜捨由他廬陵米還知價例毫髮更無差瑞鶴仙壽喜西園放鑰對燕寢香潤棠陰寒薄東風夜來惡禁煙時天氣鶯啼花落新晴共約怕韶光容易過却把銅壺緩泛金杯祓禊嬉遊行樂絃索笙簧聲裏還記蘭房正垂羅幕初眠栁弱梅如豆玉如琢向鳯凰池上鴛鴦影裏他年何啻紫橐看流芳繼踵韋平盛傳鞏洛瑶臺第一層江左風流鍾間氣洲分二水長鳯凰臺畔投懷玉燕照社神光豆花初秀雨散暑空洗出秋涼慶生旦正圓蟾呈瑞仙桂飄香肝腸掞文摛錦駕雲乘鶴下鵷行紫樞將命紫微如綍常近君王舊山同梓里荷月旦久已平章九霞觴薦刀圭丹餌衮繡朝裳望海潮癸卯冬為建守趙季西賦碧雲樓蒼山煙淡寒溪風定玉簮羅帶綢繆輕靄暮飛青冥逺淨珠星璧月光浮城際涌層樓正翠簾高捲緑瑣低鈎影落尊罍氣和歌管共清逰使君冠世風流擁香鬟憑檻霧鬢凝眸銀燭暖宵花光照席譙門莫報更籌逸興醉無休賦探梅芳信翻曲新謳想見踈枝冷蘂春意到沙洲前調為富樞密生朝壽麒麟圖畫貂蟬冠冕青氊自屬元勳緑野舊逰平泉雅咏霞舒煙卷朝昏風月小陽春照玳筵珠履公子王孫雲度嵩高影橫伊水慶生申早梅長醉芳樽况中興盛際宥密宗臣琳館奉祠金甌覆字和羮妙手還新光射紫微垣看五雲朝斗千載逢辰開取八荒夀域一氣轉洪鈞十月桃年華催晚聽樽前偏唱衝暖欺寒樂府誰知分付點化金丹中原舊逰何在頻入夢老眼空澘撩人冷蘂渾似當時無語低鬟有多情多病文園向雪後尋春醉裏憑欄獨步羣芳此花風度天然羅浮淡粧素質呼翠鳯飛舞斕斑參橫月落留恨醒來滿地香殘前調為富樞密夀蟠桃三熟正清霜吹冷愛日烘香小試芳菲時候無限風光洛濵老人星見闕少室雲物開祥丹青萬彚熊兆崑臺鳯舉朝陽向元樞曽輔巖廊記名著金甌位入中堂夢熟鈞天屢驚顛倒衣裳黃髮更宜補衮歸去定軍國平章管弦珠翠蘭玉簮纓嵗嵗稱觴感皇恩夀緑髮照魁星平康爭看錦繡肝腸五千卷出逢熙運蚤侍玉皇香案禁塗揚厯遍紆宸眷安養老成十年蕭散天要中興相公健生朝開宴長是通宵絃管藕花香不斷南風逺前調夀年少太平時名園甲第談笑雍容萬鍾貴姚黃重綻長對小春天氣綺羅叢裏慣今朝醉台衮象賢元樞虛位壯嵗青雲自曽致流霞麟脯難老洛濵風味謝公須再為蒼生起前調夀荔子著華繁清微庭院賀厦雙飛畫梁燕綺羅叢裏百和爐香祝願願從今日去身長健檀板競催榕陰初轉舞袖風前翠翹顫明年開府錫宴金鍾宣勸夀星朝北斗君王眷前調夀豹尾引黃幡宣麻金殿雨露恩濃自天遣搢紳交譽最樂至誠為善信知宗姓喜君王眷寶炬蜜香玉巵波灔醉擁笙歌夜深院西清班近雅稱元戎同燕要看茅土相貂蟬面夏雲峯丙寅六月為筠翁夀湧氷輪飛沆瀣霄漢萬里雲開南極瑞占象緯夀應三台錦腸珠唾鍾間氣卓犖天才正暑月祥光照社玉燕投懷新堂深處捧杯乍香泛水芝空翠風回涼送艷歌緩舞醉墮瑶叉長生難老都道是柏葉仙階笑傲且山中宰相平地蓬萊千秋嵗夀相門出相和氣濃春釀傳家冠珮雲臺上龎眉扶夀杖緑髮披仙氅星兩兩泰階已應升平象玉砌蘭芽長定向東風賞添綵袖褰羅幌絲簧俱妙手珠翠爭宫樣江海量年年醉裏翻新唱水龍吟周總領生朝水晶宫映長城藕花萬頃開浮蘂紅粧翠蓋生朝時候湖山搖曳珠露爭圓香風不斷普熏沉水似瑶池侍女霞裾緩步夀煙光裏霖雨已沾千里兆豐年十分和氣星郎緑鬢錦波春釀碧筒冝醉荷橐還朝青氊奕世除書將至看巢龜戲葉蟠桃著子祝三千嵗南鄉子夀山寺輞川圖霜葉雲林錦繡居夀斚浮春珠翠擁歡娛滿院流泉繞綺疏道氣自膚腴几席輕塵一點無天要耆英修相業清都已有泥書降玉除捲珠簾夀祥景飛光盈衮繡流慶崑臺自是神仙胄誰遣陽和放春透化工重入丹青手雲璈錦瑟爭為夀玉帶金魚共願人長久偷取蟠桃薦芳酒更看南極星朝斗醉蓬萊夀對小春桃艷曲室爐紅乍寒天氣七葉蓂開應金張通貴夢草銀鈎燦花珠唾是素來風味滿腹經綸回天議論崑臺仙裔祕殿升華紫樞勳舊退步真祠簡心端扆迎日天元聽正衙宣制盡洗中原遍為霖雨宴後堂歌吹柏子千秋丹砂九轉今宵長醉隴頭泉少年時壯懷誰與重論視文章真成小技要知吾道稱尊奏公車治安祕計樂油幕談笑從軍百鎰黃金一雙白璧坐看同輩上青雲事大謬轉頭流落徒走出修門三十載黃粱未熟滄海揚塵念向來浩歌獨往故園松菊猶存送飛鴻五絃寓目望爽氣西山忘言整頓乾坤廓清宇宙男兒此志會須伸更有幾渭川埀釣投老策奇勛天難問何妨袖手且作間人天仙子三月十二日奉同蘇子陪富丈訪筠翁於舊居遂為杏花留飲歡甚命賦長短句乃得天仙子寫呈兩公末章併發一笑樓外輕陰春淡佇數點杏梢寒食雨少年油壁記尋芳梁苑路今何處千樹紅雲空夢去驚見此花須折取明日滿城傳侍女情知醉裏惜花深留春住聽鶯語一段風流天付與鵲橋仙靚粧豔態嬌波流眄雙靨橫渦半笑樽前燭畔粉生光更低唱新翻轉調花房結子氷枝清瘦醉倚香濃寒峭雛鶯新囀上林聲驚夢斷池塘春草漁父家風八年不見荔枝紅腸斷故園東風枝霧葉誰新採悵望冷香濃氷透骨玉開容想筠籠今宵歸夢滿頰天漿更御泠風生查子天生幾種香風味因花見旖旎透香肌髣佛飛花片雨潤惜餘薰煙斷猶相戀不似薄情人濃淡分深淺減字木蘭花客亭小會可惜無歡容易醉歸去更闌細雨鳴窗一夜寒昏然獨坐舉世踈狂誰似我強撥爐煙也道今宵是上元眼兒媚秋閨蕭蕭踈雨滴梧桐人在綺窗中離愁遍繞天涯不盡却在眉峯嬌波暗落相思淚流破臉邊紅可憐瘦似一枝春栁不奈東風昭君怨春晚春院深深鶯語花怨一簾煙雨禁火已銷魂更黃昏衾暖麝燈落地雨過重門深夜枕上百般猜未歸來夜逰宫半吐寒梅未折雙魚洗氷澌初結戶外明簾風任揭擁紅爐灑窗間惟稷雪比去年時節這心事有人欣説斗帳重薰鴛被疊酒微醺管燈花今夜别楊栁枝席上次韻曽頴王深院今宵枕簟涼燭花光更籌何事促行觴惱剛腸老去一簔煙雨裏釣滄浪看君鳴鳯向朝陽且腰黃綵鸞歸令為張子安舞姬作珠履爭圍小立春風趂拍低態間不管樂催伊整朱衣粉融香潤隨人勸玉困花嬌越樣宜鳯城燈夜舊家時數他誰江神子夢中北去又南來飽風埃鬢華衰浮水飛蓬蹤迹為誰催自笑自悲還自語一杯酒鼻如雷曉輿行處覺春回屑瓊瑰糝莓苔病眼衝寒欲閉又還開水近人家籬落畔遙認得一枝梅西江月和蘇庭藻小閣劣容老子北窗仍遞南風維摩丈室久空空不與散花同夢且作太真逰戲未甘金粟龍鍾憐君病後頰顴隆識取小兒戲弄訴衷情余兒時不知有荔子自呼為紅蕊父母賞其名新昔所未聞殊盡形似之美久欲記之而因循比與諸公和長短句故及之以訴衷情蓋里中推星毬紅鶴頂紅皆佳品海舫便風數日可到兒時初未識方紅學語問西東對客呼為紅蕊此興已偏濃嗟白首抗塵容費牢籠星毬何在鶴頂長丹誰寄南風採桑子奉和秦楚村使君荔枝詞華堂清暑榕隂重夢裏江寒火齊星繁興在氷壺玉井闌風枝露葉誰新採欲飽防慳遺恨空槃留取香紅滿地看菩薩鬘送友人還富沙山城何嵗無風雨樓臺底事隨波去歸棹望譙門沙痕炯斷雲詩成空弔古想像經行處陵谷有餘悲舉觴澆别離前調微雲紅襯餘霞綺明星碧浸銀河水欹枕畫簷風愁生草際蛩鴈行離塞晚不道衡陽逺歸恨隔重山樓高莫憑欄浣溪沙詠木香睡起中庭月未蹉繁香隨影上輕羅多情肯放一春過比似雪時猶帶韻不如梅處却緣多酒邊枕畔奈愁何好事近華燭炯離觴山吐四更寒月公子唾花枝玉盡一時豪傑三冬蘭若讀書燈想見太清絶紙帳地爐香暖傲一窗風月南歌子玉斧修圓了氷輪分外清共看星向繡衣明元是生朝為夀對難兄鴻鴈翻秋影塤箎和笑聲他年中令綵衣榮記取今宵丹荔醉瑶觥醉花陰詠木犀紫菊紅茰開犯早獨占秋光老醖造一般清比著芝蘭猶自爭多少霜刀剪葉呈纎巧手撚迎人笑雲鬢一枝斜小閣幽窗是處都香了點綘唇小雨忺晴坐來池上荷珠碎掉眉濃翠怎不教人醉美眄流觴白鷺窺秋水天然媚大家休睡笑倚西風裏花心動七夕水館風亭晚香濃一番芰荷新雨簟枕乍間襟裾初試散盡滿天溽暑斷雲却送輕雷去踈林外玉鈎微吐夜漸永秋驚敗葉涼生庭戶天上佳期久阻銀河畔仙車縹眇雲路舊怨未平幽歡闕駐恨入半天風露綺羅人散金猊冷醉魂到華胥深處洞戶悄南樓畫角自語驀山溪一番小雨陡覺添秋色桐葉下銀牀又送個淒涼消息故鄉何處搔首對西風衣線斷帶圍寬衰鬢添新白錢塘江上冠蓋如雲積騎馬傍朱門誰肯念塵埃墨客佳人信杳日暮碧雲深樓獨倚鏡頻看此意無人識踏莎行别意選草堂别芳草平沙斜陽逺樹無情桃葉江頭渡醉來扶上木蘭舟將愁不去將人去薄劣東風天斜飛絮明朝重覔吹笙路碧雲香雨小樓空春光已到銷魂處
