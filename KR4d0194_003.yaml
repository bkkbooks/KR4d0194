body:
  text: 蘆川歸來集卷三宋張元幹撰七言律詩次韻送友人過山隂郡時夜别于舟中草草杯盤燦燭光故人相對水雲鄉濤江君去訪秦望丘壑我歸為楚狂活國未逢三折臂憂時空轉九回腸絶憐明發成南北夢寐全無夜太長喜王性之見過千金村春來書劄已西東喜復相逢亂世中萬事變更唯舌在三年流落轉塗窮雲收野寺侵廊水月挂孤帆送客風剩欲留君明日住夜䦨難得一樽同次江子我遷居韵平生自省宜三黜老去何心望九遷避地湖山聊復爾脫身兵火想當然浮家泛宅非無計坎止流行本信緣猶恐驚濤翻四海直須化鶴作飛仙次趙次張見遺之什韻海邉游子日思歸新句勞君更置規莫問人間多貝錦正如天上有參旗寄書只欲憑黃耳去路誰能畏赤眉定與故巢猿鶴老此生無愧北山移過雲間黃用和新圃繚池剩欲開花徑傍舍先須作草堂雨後不妨頻檢校客來留得共徜徉故園怪我歸何晚避地輸君樂未央待得功成方卜築豈如强健享風光蘭溪舟中寄蘇粹中氣吞萬里境中事心老經年江上行三徑已荒無蟻夢一錢不直有鷗盟雲收逺嶂晚風熟浪打寒灘春水生鴻鴈北飛知我意為傳詩句濮陽城别綬老無端流落迫殘年三十南山訪老禪未契安心了難覓不如同世且隨緣頻移竹几負寒日旋拾松梢炊晚煙珍重孤雲出山去東西南北一青天次江子我聞角韻夫差故國縈寒水鐵馬南來忽振纓城上昏鴉爭接翅舟中逐客謹逃名悲笳怨處風微起濁酒醒時夢易驚飄泊似聞山寺近真成夜半聽鐘聲次韻奉呈公澤處士屛迹苕溪少往還時危尤覺故人歡相期臘盡屠蘇酒速享春來苜蓿盤雪夜劇談烽火急風江絶歎鐵衣寒何年塞上烟氛靜薄海蒼生慶乂安次友人寒食書懷韻二首往昔升平客大梁新煙然燭九衢香車聲馳道內家出春色禁溝宫栁黃陵邑秖今非漢土衣冠誰復問唐裝傷心寒食當時事夢想流鶯下苑牆孤生投老急菟裘萬里雲山已倦游共喜石交逢異縣更陪綵筆賦春愁無心俯仰猶多事與世浮湛已拙謀冷雨吹花作寒食三杯軟飽且眠休訪親于連江因過筠溪叩門循行歎其荒翳不治有懷普現居士口占此章筠莊主人何未歸溪畔長林穿翠微此去功名時欲至箇中車馬蹟全稀茅茨漏久蝸涎篆籬落欹多蛛網圍公肯借菴容我老為公朝夕掃柴扉奉同公直圮老過應夫石友齊王郎胸次鬱峥嶸鑿牖開軒不浪名疾世政須論石友絶交今已見方兄我曹自笑真同病吾道誰當為主盟但得此心如此老故人寧復負平生宫使樞密富丈和篇髙妙所謂壓倒元白末句許豫尤非所敢承謹用前韻叙謝修門一出十經春相業時來自奮身袖手深謀終活國揮毫佳句且驚人話言每許聞前輩賔客何堪接後塵待掃欃槍洗兵馬兩翁元語記天津子立昆仲埀和遊天宫詩既工且敏義不虛辱再此見意華裾緑髮等青春詩似機雲定後身家學乃翁真具眼祖風當代豈凡人字中仙爪便搔癢句裏靈犀解辟塵萬壑爭流君看取西興從此是通津端常觀察被㫖入蜀迎母夫人所得贈行詩文成巨軸矣臨别亦辱見索匆遽中愧乏好語掇拾諸公餘意勉成四韻髫齔分携幾見春它時有恃獨常顰何期萬里漂零後忽報三巴信息真素髮輕安膺晚福逺懷悲喜望征人王孫盛事今雙美及早歸來奉紫宸次韻文老使君宗兄見贈近體佳什兩篇僕與公别四十餘年一旦邂逅情著于辭使君元自錦官來百丈重尋灔澦回化閲行年如伯玉心成全德過王駘把麾政爾人生貴持槖終期間世才莫問桃花今老矣劉郎去後任渠栽舊游蘭若盡英才坐上髙談亦壯哉老去語音雖記憶衆中容貌各驚猜津亭夜雨故人少樽酒燈花鄉信來茂苑相逢話京洛柂樓猶喜待春回冬夜書懷呈富樞密耳聾無用問新聞矯首何妨目作昏癡絶已甘投老境背馳寧受乞憐恩難陪年少從渠薄賴得春回為我溫京洛交游頻檢校渡江今有幾人存次韻趙元功贈李季言之什赤縣飄零未易逢那知今夕一樽同好招明月共清影託與白雲行太空戃恍舊游如隔世蹉跎壯志莫論功兩公秉燭還相對情話從渠半醉中次韻元功才友道中見貺因以解嘲當時勇决徑歸休更有人愚似我不何許置錐寧免纍直須畢娶始無憂頻遭白眼傷流俗誰向青門念故侯客裏題詩相慰藉羡君椽筆合螭頭奉送朝伯南歸金溪君家諸父多人傑半是平生親舊間莫話故園空矯首相從逆旅足開顔文元勳業金甌字昭德風流玉筍班此去騰驤吐虹氣何由來伴老夫閒奉簡才元探梅有作兼懷舊游遮莫胡僧問劫灰且陪東閣賦官梅春梢慣識宫粧樣花信偏隨驛使回痛飲我曺身總健浩歌誰怕老相催疏枝氣壓羣芳盡羞殺牆隂錦被堆才元思如湧泉愈和愈好晨興遣騎扣門披衣疾讀走筆再酬嚴韻陽和生發驗葭灰但見江梅缺蠟梅風味向人忘冷落歲寒乘月重徘徊從來對酒遭花惱何獨題詩被雨催公子唾珠無限思更看鐵畫寫離堆奉酬才元席上所賦前韻夜飲華堂燭屢灰暗香浮處數枝梅坐中一笑對三粲客裏此歡能幾回醉後不知歌扇去歸時還是曉鐘催露濃月白溪橋路但記羣山翠作堆冬夜癡坐似聞才元作集有日矣因和前韻奉呈擁爐書帙易塵灰覽古臨窗獨對梅未寤徑須呼子慎常奴何得比方回虛名到底將安用能事從來不受催似許相過陪客醉胸中那復有愁堆遊東山二詠次李丞相韻寒木髙蘿幾曲溪斷碑零落臥荒祠澄潭想像雲頭涌懸瀑依稀雨腳埀地軸漫煩龍虎戰天符那得鬼神私茫茫造物殊難曉要是為霖自有時右鱣溪公如謝傅暫閒身我亦歸來效季真山屐數陪銷暇日詩篇常許和陽春虛懷寄傲三休外洗眼旁觀萬態新谷口榴花解迎客騎鯨端為謫仙人右榴花谷留寄黃檗山妙湛禪師晨發薌城越數峯我來師出失從容白雲遮日蔽秋寺青嶂聞猿驚暮鐘世亂可無閒地隱山深偏覺老僧慵他年芋火談空夜雪屋松窗約過冬用折樞韻呈李丞相二首參陪仍許瘦笻支長者登臨敢後期鐘斷白雲飛雨過月生青嶂夜凉時心知勝地都忘睡喜聽連牀共和詩蓮社風流增荔子餘生長健更何為莫問蒲萄出月支不緣瓜棗訪安期輕紅滿地人慵掃空翠霑衣雨足時松䕃晴泉聽落澗蟬嘶晚吹助裁詩公乎此去歸廊廟無用山中怨鶴為再和李丞相遊山海山幻出化人宫樓觀新崇萬指容雲霧入簷銀色界藤蘿昏雨妙髙峯放懷久已參黃檗雅志無疑伴赤松欲去更聞獅子吼忘歸橋下興猶濃次錢申伯遊東山韻二首東麓坡陀盡梵宫我來泉上照衰容解衣又作茶瓜客倚檻同看煙雨峯何用苦吟凌鮑謝要須髙節配喬松海冰永閟錐沙畫絶歎故人遺墨濃掃榻開軒走寺宫吾曺終日得從容夕陽初落鱓溪路雲氣半遮獅子峯試問丹砂回白髮何如瀑布煮枯松暮年縱有壯心在歸意已勝山色濃次韻錢申伯遊東山既歸述懷之章山人不省大明宫懷昔幽尋自改容廬阜東西二林寺錢塘南北兩髙峯百年有盡雲歸壑萬事無邉月掛松滿院蒼苔重到日秋光欲滴向人濃哭鄒德久二首用前韻出守真成夢蟻宫天台雲色亦愁容時來盍錫萬釘帶仙去俄歸羣玉峯川上可驚如逝水嵗寒徒有後凋松煩將老眼銀河淚共灑西風絮酒濃窮逹那知十二宫由來與世不相容乃翁極諌牽龍衮百謫同愁割劒峯前輩品題推玉樹平生憂患挺蒼松傷心身後夸君賜泉路恩光底事濃再用前韻哭德久女無美惡妬深宫盛德如公果不容何遽蓋棺臨禹穴未應藏骨在秦峯論文平日樽中酒挂劔它年冢上松㸃檢交親秪解少存亡悲感老情濃再用前韻重哭德久賢使君風撼棠梨對殯宫中郎談笑孰形容不居上界神仙府當在補陀孤絶峯至論每符磁石鐵長生空問茯苓松九原可作還知否底處返魂香最濃與富樞密和氣從容一笑春如公今是暫間身伊蒲饌設無多客薝蔔花繁正惱人已遣爐熏通鼻觀更分茗碗瀹心塵僧房長夏宜幽僻杖屨頻來願問津止戈堂譙門直北望燕山乙巳年來例破殘可但中原仍禍結誰令東粵獨偷安西師有請君侯力南顧無憂聖慮寬惡少至今猶膽落雲臺須入畫圖看八州賢牧喜休兵千騎重來竹馬迎萬瓦連甍存比屋十年回首賴長城舉觴談笑精明甚緩帶登臨步武輕多是門牆舊賔客願公黃髮佐升平次友人書懷此生無意入修門粗飽雞豚短褐溫卜築幾椽臨水屋經營數畝傍山園酒杯賸喜故人飲書帙能遮老眼昏身世頗同猿擇木功名誰問鶴乘軒腸斷春風楊栁花中原何日再京華將軍未報歌三箭樂府徒傳舞兩娃㑹見敵營如竹破不應淮甸又兵加頻年寒食常為客强索芳樽樂有涯布榖催春惜雨乾白鷗江上未盟寒且傾客子酴醿酒共享先生苜蓿盤我已懸車羞􅣗􅣗公當鳴珮稱珊珊休文才思雖多病可是空吟紅藥䦨和楊聰父聞雨書懷坎壈如公莫怨天謫居端是坐無氊時來要自有歸路客散不妨頻醉眠雲氣久能浮蜃屋雨聲殊未透龜田回思風雪圍爐夜何處聯裘擁木綿筠溪居士跳出隨順境界把住放行自在神通縱橫妙用已是摸索不著妙現老子猶眨句中眼可謂善知識用心謹次嚴韻上呈珍重筠溪舊主人我知明水是前身如何一念初無過便有多生未了因止酒裙襦成厭雜逃禪槌拂要比鄰雲居嫡子重拈出流布諸方此話新次韻聰父見遺二首十年遷客北歸時旁海相逢歎渺瀰枝上煙光忙蛺蝶尊中風味奪酴醿老來詩思真枯井别後心情似亂絲喜故將軍殊矍鑠家山小築未為遲雞嶼洋邉桃李穠岸沙遮海暮雲重乘槎我自犯牛斗掘獄誰何藏劔鋒世路肯遵前覆轍交遊誰識後雕松此生但得長相見一笑能輕祿萬鍾次聰父見遺韻拙速還知勝巧遲男兒功業要逢時不妨唾面辱髙馬似有泥坑規病鴟老去尚堪蘇子印興來須到習家池此心畢娶無餘事且向春江理釣絲李丞相綱生朝三首梁溪萬折必流東間氣英姿叶夢熊出入三朝推大老險夷一節合蒼穹守關虎豹徒窺闖得雨蛟龍定長雄衮繡未歸聊袖手不妨間作黑頭公將壇丙午贊親征相印元年佐聖明賊子亂臣俱破膽皇天后土實同盟扶持更係民休戚進退元知勢重輕捨我其誰公健在乞身贏得見升平濟世功名肯力為風雲遇合貴逢時欲知辟榖師黃石便是扁舟號子皮後進忌能踰日月敵人用間果蓍龜福城東際笙歌地且祝千齡醉荔支代上折樞彥質生朝二首天扶王室挺生申瑞啓中興社稷臣樽俎折衝常自任廟堂康濟更何人秋風玉帳軍容肅冷月鈴齊夜宴新願掃妖氛開夀域衮衣端為轉洪鈞秋水為神吉夢隨上公冠佩儼朝儀風雲感遇千齡㑹日月依光四海知筆陳詞鋒明藻色龍韜豹略繫安危頑金從此歸爐錘歲歲門䦨獻夀詩福帥生朝二首玉帳生朝香霧飛秋風欲到碧梧枝回思十載折衝地還鎮八州安靜時淇澳㑹須歌緑竹渭濵猶待獵非羆止戈堂上多珠履爭獻龎眉春酒詩金貂赫奕照來仍雅意諸郎以夀稱矍鑠儀形千歲鶴扶搖風力九霄鵬黃雲䆉稏人皆醉丹荔芳敷俎正登請看君侯髙閣宴層梯無用一枝藤葉少藴生朝三首絳節霓旌下九天括蒼初識地行仙桃華海上三千歲鳳厯人間五百年可但彤弓尋節制要知黔首望陶甄香凝燕寢森蘭玉㑹見貂冠總附蟬緑髮翺翔翰苑春升平三輔已朱輪詩成山谷句中眼名應石林天上人耆舊政須廊廟具蕃宣聊寄股肱臣生朝賸欲為公夀醉裏蘋花度曲新元戎玉帳凜霜威談笑何妨羽扇揮平日丹心馳象闕長年綵服奉慈闈誰無五馬人生貴獨有三竒命世稀志在麟經成事業頗聞天子詔公歸題企疏堂出處當師漢大夫立朝常擬賦歸歟賜金端為供行樂燕客猶疑是送車欲識吳門重解組要符潭府向移書聞知賸有間風月宅相須留待小疏左舉善人物髙妙才具敏特要當為世用而乃㩦孥撫孤以不二價從事丹壺中其胸次詎可窺耶一日出示諸公篇軸邀老夫同賦義不可辭小隱丹壺時憑欄它年興在跨黃斑不妨游戲橘中樂政爾經營湖上山誰識胸懷容萬頃聊將身世寓三間故人有子猶流落我輩逢渠轉厚顔病中示彭德器老病無堪正坐貧交遊相見賴情親從渠造物小兒戲不礙維摩老子神三顧九遷成底事一區二頃合由人君侯論議髙千古略假毫端問大鈞挽李丈然明眼看流輩上青雲拂袖歸來晝掩門心計豈容生事拙時名長與故山存不妨開徑栽花卉政復藏書遺子孫八十光隂無可恨聊歌楚些為招魂再次前韻即事太一遊行遍九宫世間無地可寬容坤維莫傍劔門閣衡嶽何依天柱峯睨柱儻能回趙璧思鱸安用過吳松羣羊競語遽如許欲息兵戈氣甚濃再用韻奉留聰父長飢方朔笑侏儒歲晚還驚大小餘客裏論文聊把酒間來㑹面勝通書薄寒欺醉悲清夜孤月流光悵碧虛何苦相逢又相别不如供米寓僧居辛酉别楊聰父春風著意送將歸為賦清江落日低惜别更留烹玉鱠寓居長記對青猊家山彼此歸心速岐路東西客夢迷重把一樽成悵望鶯啼緑暗草凄凄次韻陳德用明府贈别之什人欺季子弊貂裘誰信班生萬里侯小隱故山今去好中原遺恨幾時休春爭殘臘寒梅早雨澀晴冬宿麥憂老眼相看炯無語濁醪何日更澆愁希道使君弭節合沙館奉太夫人遊鼓山乃䝉封示所和夢錫贈行佳句輒次嚴韻少叙别懷淮海元龍公輩流何勞老手鎮方州雍容行色自登覽邂逅故人仍倡酬眼界蚤驚雲子熟官期能為荔枝留臨分莫話中原事想見家山只夢遊希道使君入山再有佳句見及復次元韻因簡老禪古澗寒泉可枕流從渠庚伏在炎州杖藜端欲事幽討杯酒未容相勸酬坐上縱無居士客山間聊為老禪留臨滄亭外忘歸路他日逢君望舊游
