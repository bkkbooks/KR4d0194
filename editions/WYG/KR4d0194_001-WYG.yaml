body:
  text: 蘆川歸來集巻一宋張元幹撰四言詩紫巖九章章八句上壽張丞相紫巖大丞相張公生朝善頌也公帥閩之二年歳在作噩秋九月中澣有客作是詩以獻焉赫赫紫巖白虹貫淵玉生其中匪雕匪鐫登于廊廟圭璋渾全温如之質所寳象賢紫巖赫赫衆山維則秉國之鈞百僚是式志殄仇方力復明辟時方中興勲冠今昔紫巖髙兮上摩穹窿雨露潤澤風雲㑹同表宋宗臣禮泰智崇皇以昭之簡在帝𠂻紫巖廣兮作鎮坤位盡臣之道厚德以載開國南陽厥緒光大是似是續福禄未艾瞻彼紫巖降神所儲進退有度威儀甚都粤自己未帥於無諸以忠以孝奉承安輿北堂之尊命婦稱首逢是穀旦酌以大斗公如老萊衣衮裳繡式歌且舞以介眉壽土宇未復繄公闢之士風未變繄公革之軍律未振繄公鼔之國論未定繄公斷之來朝伊何築隄于沙對敭伊何言宣其麻明明天子坐于正衙徯公來歸相我邦家紫巖之松在澗之沚下有茯苓兔絲蔓只結為琥珀深根固柢願公難老受茲燕喜五言古詩雒陽陳去非自符寳郎謫陳留酒官予時作丞澶淵舊僚友也有詩次韻寒水遶近郭棲鴉蔽高原映帶幽人居暝色起草根衡門東南開濁河日夜奔所喜古堤月初出煙江村不入城市久懶訪亡與存羡子了萬事坐以一氣春丁未歳春過西湖寳藏寺作湖垠取微徑窈窕松門深中有古佛屋閴無人足音春雲帶飛雨冷色來蒼岑孰知戎馬盛但見藤蘿隂平生雲卧想正欲幽夢尋不減避世士契此太古心乙夘秋奉送王周士龍閣自貶所歸鼎州太夫人侍下語離三秋風念子萬里客我獨憂患餘幾為死生隔相逢忽眼明照影俱頭白蘭若清夜長連牀話疇昔如何功名心一旦乃冰釋賣藥真徉狂穿雲忘遷謫不然蔬笋腸寜無瘴烟色良由火棗成内景充尺宅下視陋九州槐安等稱國絶憐蠻觸爭亦復弄兵革亂來更多事老去覺世窄歸歟桃花源斑衣作兒劇此樂人所稀今我那能得他時南山南寄書北山北奉和希道新句兼簡祖穎漕使秋來乏隣酤近事采塗說愁多費陶寫户小輒敗闕誰能空隱憂判飲最良䇿両公俱世豪風味奪佳節手釀罋中春香浮玉丹色相餉走鴟夷芳辛真妙絶共賦醉鄉詩銷磨閑日月頗聞鎖娉婷迴風舞流雪何妨出房櫳滿引快關膈此念想當然清尊可虚設我老畱甌閩感時夢淮浙公其招故人亦記未歸客送舒希古老舒古君子送客皆善類觴行頗軒渠一斗輒徑醉涼颸生白蘋落日照紫翠驪駒雖在門不下兒女淚儻復逢湘纍更與問憔悴謂胡邦衡過白彪訪沈次律有感十六韻天驕毒中原國勢苦日削一為虚聲搖顛沛幾失腳翠華棲海隅此戯亦太虐忽聞哀痛詔迸淚向寥寞何當速悔旤四海安耕鑿迺者浙西帥望風先即却坐令臨安城開關猶白著只今鋒鏑餘寃鬼號㝠漠賞罰二大柄倒持示微弱豈無英雄人戴宋心未薄有如沈使君忠義等籌略始終誓復仇志願久已確浮家來水村避亂畏矰繳行矣收功名逺過麒麟閣氣投平生歡事付今夕噱吾衰世無用鼓勇徒矍鑠七月三日雨不止後一日作暝色復已夕雨聲全未疎掩關頗嗜卧篝燈空照書㸃滴聞瓦溝決溜鳴堦渠試作華屋想未減嚴城居大江洶波浪曠野風號呼那知三家村有此一腐儒是身在宇宙何適非蘧廬陵谷儻遷變樓觀皆空虚安心無秘法絶念忘畏途生死尚可處此境固有餘題王巖起樂齋宦遊適樂土宴坐名樂齋問君何獨樂胷中高崔嵬軒裳儻來物世途吁可哀紛然雞鶩爭陷穽成禍胎不如尋蠧魚簡編閱興衰萬事付杯酒百年俱刼灰搘頤忽長嘯妙想從天回人生行樂耳勿為華髮催陪李仲輔昆仲宿惠山寺蒼山􅍶崒中殿古起野色仰空象緯高撫事戎馬隔三子俱人豪語黙有典則安知今夕游值此老賓客危言驚鬼神懷舊痛京國寄書白帝城問道屈原宅三春聞竹枝萬里共悽惻風來松柏悲月落世界黒相看炯不寐袖手了無䇿去去更酌泉吾生易南北和韻奉酬王原父集福山之什平生契所崇晚得故人語驚呼追曩㳺世道今如許中原鞠茂草萬里盡豺虎天王巡江濆對壘眺淮楚未聞誅叛亡快憤斷腰膂上復九廟讐下寛四民苦胷中有成奏無路不容吐天高雲霧深灑泣逃罪罟朅來陪勝集人物良可數高氏父子賢王甥兄弟窶相過茶酒間窮年簡編處喪亂共傷時興衰更懷古假日聊銷憂信美非吾土夜闌然薪歸被酒踏寒雨買山結茅茨我老竟何所要當喬松根白石仍同煮奉送真歇禪師徃住阿育山兼簡黃檗雲峰諸老時流罕識真特立取衆忌不有明眼人誰止萬口沸古今冠蓋場毁譽固一致胡為空門中生滅亦滋熾更憐晚學徒遍㕘反諛媚妄將宗𣲖分未必盡師志要是鷹犬姿迺出蛇䑕計堂堂真歇師的的示大意所向古道場衲子悉傾至徃年入呉閩宴坐走檀施繼踵幾尊宿建立各超詣南方祖令行山川久増氣乃知羣魔怖不樂佛住世休歇雲卧菴謗焰息氛翳歘然天門開黃紙書廣利萬態復現前頗似厭權勢去來初何心緣感夲自契憫茲象衆衰願力捄深弊維師法梁棟世道貴相濟露風吹海雲瘴嶺發巖桂欲挽衣裓留意已萬里外我老卜後期夜話炯不寐送言上人徃見徑山老十四韻忽辭皷山行便作徑山去道人孤飛雲腰包咄嗟具兩邊兄弟間楊岐一條路禪許衆人㕘院要大家住無是亦無非何喜復何怒同粥皷齋鐘等燈籠露柱佛眼接竹菴雲門透圓悟爾則有師承心共成佛祖可笑世上兒妄念分毁譽石火電光中畢竟什麽處所得能幾多造業不知數生死到頭來請問末後句窮漢未必窮富漢豈真富入門相見時此話莫錯舉建炎感事乾坤忽震蕩土宇遂分裂殺氣西北來遺毒成僭竊議和其禍胎割地亦覆轍儻從种將軍用武寨再刼不放匹馬回安得兩宫說巍巍開國初真宰創鴻業一統包八荒受降臨觀闕并州稍稽命駢頭亟膏鉞于今何勢殊天王狩明越諸鎮本藩翰楚破闔城血翠輿欲東巡蹈海計愈切詔下散百司恩許保妻妾瞻彼亷陛尊孰與壯班列肉食知謀身未省肯死節檢校輿地圖寜復見施設三呉素輕浮傷弓更心折四顧皆驚波蒼黃共嗚咽維茲艱危秋貧士轉疎拙明年穀増貴賢愚罔分别何處置我家患在建午月故山盍早歸豈憂踐霜雪作意海邊來初非事干謁責我賣屋金流言尚為孽汪公德甚大游說情激烈力救歸裝貧一洗肝肺熱如公趨急難正似古豪俠行藏道甚明親養志先決去矣茅三間無問衣百結他時期卜鄰此日尤惜别請以兄事公尺書未宜綴奉同黃檗慧公秀峰昌公丁巳上元日訪鼓山珪公游臨滄亭為賦十四韻孤雲乗天風飛入海上山松聲發鼔吹導我登層巒平生烟霞想政在巖壑間及茲百事懶作意三日閒聊將燒燈夜付與兒輩看來陪老禪伯杖履同躋攀曲折幾蘚磴竹引春斕斑竇口咽細泉崖腹鳴飛瀾足疲眼界逺語樂心地安倒景射西崦晃蕩雲海寛十年戎馬後集此蘭若難未必支許游能盡賓主歡暝色到峰頂月光散林端摩挲忘歸石告以幽遐觀九月一日與王季夷酌别為賦十六韻黃鵠摶秋風一舉輒萬里飛鳴蓬蒿間燕雀徒為爾王郎志凌雲英妙良可喜片言隻字竒採掇殊未已樂從長者遊論事亦亹亹知我中原時早與大門齒流落天南端相過不相鄙迺翁四男兒君蓋處其季家世賢弟兄自立要如是古學儻有成終身保無愧陋哉斗筲人惟見目前利茲焉入三呉索詩餞行李何補僕馬饑聊復慰深意可同洪喬書盡付淛江水今夕燈燭涼便當茱菊醉畏途重語離缾卧莫遽起訪周元舉菁山隱居胷次飽丘壑迺覺軒裳輕舉世沈湎時勇退公早醒十年烟雨簔手種松杉成蒼根鬱寒霧老色入户庭棲心不爭地似欲畢此生那知戎馬際亦使山房驚四海方蕩潏積骸盈破城公豈失䇿者獨留枯槁形賊舟㑹稍逺請復安柴荆暗泉雜夜雨稚笋肥晨烹起予歸去來故山今可行胡為困羇旅浩歎常吞聲七言古詩次仲彌性所和陳丈大卿韻伏波晚歳思少游萬事過眼如雲浮我生不樂城市隘受性但愜林泉幽稍同臭味自投合肯與流俗相對酬旅懷久已乏佳趣白日政覺多閒愁舂容大篇忽旁及氣象楚澤涵新秋律嚴雖許强續尾韻險豈復能畫籌逍遙一舸白太傅蹴踏五字韋蘇州主人頻誇小鬟舞勸客且聽呉娃謳從來誰數折巾郭重到似是栽桃劉夢入江湖渺春水何如此念隨輕鷗林宗自况也東平劉左車坎止春歌先朝相國今幾家我嗟夫子鬢已華瓊艘頗慣倒膏乳老來手釀尊仍窪百年彈指法界觀萬事過眼天女花聊學兒曹作春甕喚客取醉無等差夜眠不覺體平粟夘頰共眩朝蒸霞養生妙處本無說我輩豈解燒丹砂糟牀正可珠的皪石鼎莫放聲咿啞東風遮幕雪埋屋坎止齋中酒初熟送高集中赴漳浦宰三年烏石僧房居忍飢待次真臞儒有意載酒問竒字無事閉門抄異書一行作吏去漳水斂版趨廊參刺史胷中豪氣半銷磨稍覺風波生眼底高郎高郎君莫嗔舉世未有如君貧毁官不復謁時宰老大甘為行路人君今業巳臨民社辦取催科時下下不然彭澤歸去來簿領笞榜何為哉男兒䇿勲有時節家世況自圖雲臺信中居仁叔正皆有詩訪梅于城西而獨未暇載酒分付老拙其敢不承關山徃歳曽冰裂跋馬平坡千樹雪疎枝冷蘃最撩人雪後生香微帶月醉中不數長短亭狐裘擁鼻風前醒十年䘮亂豈記憶一見新詩心目驚平生公輩真豪友意氣相投共杯酒祇今流落天南端悵望中原莫回首及身强健頻看梅此花到眼春光催玉人風味正清絶但欠雪月相裴回欲訪城西尋醉語竹籬茅舍知何許擕壺藉草儻不嗔便與此花長作主希道使君見遺古風謹次嚴韻君侯氣挾飛仙骨挿腦伏犀高崪屼榮枯過眼海一漚出處何心兎三窟養生得趣喜按摩子夜不眠頻叱咄枕中玉函妙以微肘後金精恍兮惚我真蒲栁欲師承刻畫無鹽恐唐突似聞有意贈刀圭倒巻逆流飜澥渤世間萬態古今同政可忘言佯吃訥杖藜未辦飲菊潭且看㝠鴻秋滅没葉少藴生朝先生早貴當天升文章爾雅傳六經腹包萬卷書縱橫玉堂草制羣公驚繡韀緑髮趨承明意氣已向沙堤行出入四紀更寵榮聲華摩空鬱崢嶸坐嘯十郡厯九卿視公進退為重輕聖神天子開延英丞轄政地思儀型中開香火祠殊庭石林高卧憂蒼生五載筦鑰司陪京貔貅百萬環屯營大江千里依長城控制勍敵堅其盟詔書移鎮來斾旌山川草木知威名潢池桴鼓令不鳴盡歸戯下息鬬爭維師鷹揚宇宙清指顧號令驅風霆小試擒縱孰敢攖部曲愛戴如父兄太阿龍泉發新硎逆順之勢如建瓴綸巾羽扇寛作程韜略堂堂時俗評乞師未用牛酒迎胷次自有堂上兵姦宄革面輸忠誠碧海不復鱷鯢腥細數前輩存典刑爛爛伴月唯長庚歳時建已嶽降靈三竒天運乙丙丁良辰樂事非難并香凝燕寢合鼓笙舞翻流雪歌囀鶯兒孫遶膝奉兕觥安輿綵服壽且寜五福共應南極星龎眉鶴骨超籛鏗清都絳闕吞蓬瀛明年正拜居阿衡鑪錘造化推至誠黼藻王度重丹青雲龍㑹遇真千齡羲和日馭無虧盈永佐火德輝炎精賦漳南李幾仲安齋詩羔豚蒸乳活臠牛口腹造業誇炰羞儻知晚食足當肉一飽何苦多營求先生睡美黒甜處那聞鐘鼓朝鳴樓布衾竹枕自穩暖此念灰冷百不憂世間寢食乃日用衆生擾擾如蚍蜉昔年我亦走南北徃反萬里無停輈胷中不作異鄉縣有似坐閲十數州雲山渾如舊過眼歳月不覺春已秋宿君齋屋亦偶爾更僕笑語久未休夜闌各困且打睡明日飢飽臨時謀次韻奉酬楞伽室老人歌寄懷雲門佛日兼簡乾元老珪公并叙鍾山二十年事可謂趁韻也雲門道價傾緇白一去如何絶書尺乾竺宗㫖超隱峰客至不鳴齋後鐘楊岐兒孫真鐵脊二子等是僧中龍平生我如拆韈線老來要認本來面憶昨二老初相知竹爐擁衲清夜圍佛眼霜顱象懶瓉圜悟辨口吞韓非鍾山徃事無人識我識二子因師得楞伽一句作麽生請問同參俱本色贈慶紹上人上人久住湖外遊辛亥春陷孔彦舟長沙城中就驅掠七十七日遭拘留眼看殺人等螻蟻劒血洗盡湘川流張帆方離道林岸鼓枻已過巴陵樓兵纒妖氣草木暗火熾兇焰雲烟愁衣冠子女半同載俛首悲泣猶驚羞䝉衝頗諳大風浪舴艋或掛長戈矛兩舷矢集閙如雨勢欲欹側爭先投相牽浮湛狀菱荇乍墜出没真鳬鷗衆生流浪幾生死愛河苦海何時休曹成馬友互屠滅偶爾不殺老比丘枯顱茁髮蟣蝨滿得脱性命非人謀孰知賊黨亦方便日供齋鉢仍茶甌南歸數年閉户卧故山精舍松颼颼灰心一切本夢幻返照逆照無人牛細聽此語重歎息羣盜掃迹夫何憂吾閩目前豈不樂禾稻未穫先麥秋師來訪我問居士我若訪師尋淨頭西峽行西峽門東晩潮上濤頭駕風高數丈絶江艇子更揚㠶風水相吞兩岸壯中流蕩潏思慮深欲濟未竟愁夕隂賈客胡商數航海忍死射利誠何心不如遵陸困輿皁九折羊腸復相惱下臨湍瀨千仭淵胥靡輕生履危道我曹過計常私憂埀堂之戒寜自尤經營一飽亦細事世亂畏塗歸罷休少年新進真兒劇浪喜功名不量力殺身無補誤朝廷天下英雄古難得奉送李叔易博士被召赴行在所君嘗手校輿地圖上下千載鈆黃朱斯人魁磊豈假此願見尅復東西都胷中逺略指諸掌表裏拄腹撑腸書深知禍起取幽薊頗覺氣王吞青徐眼看僭偽忽亡滅逆黨未足勞誅鋤萬方助順事可卜火運要是穹蒼扶興衰撥亂戴真主㑹掃氛祲開雲衢于今荆淮付諸將控帶川陜襟江湖儻能倒用進築法更許世襲宏規模兩河境土不難辦狡冦膽落遊魂孤古今徒聞作戎首中國禮義終如初公家自有中興相雅意泰階光六符難兄難弟實間出直欲竝駕仍齊驅承明入謁一見決三遷故事登元樞整頓乾坤賴公等我病只合山林居殘年正爾甚易與不過二頃鄰一區平生故人半廊廟老僧何患無門徒與君痛飲遽成别努力强飯供時須男兒富貴亦細事否泰相反分賢愚酒酣起舞莫作惡行矣自愛千金軀本朝再造舊基業速拯塗炭疲氓蘇勿令毫髮有遺恨文章爾雅華國猶其餘拜顔魯公像呉興祠堂祀百世凛凛英姿有生意坐令異代乾没兒莫敢徜徉來仰視唐家綱紀日陵遲僭竊相連益昌熾我公人物第一流皇天后土明忠義屹然砥柱立頹波未覺羊腸隳坦履欲回希烈叛逆心老夫但知朝覲禮年埀八十位太師平生所欠惟死耳死重泰山古所難杞鬼竊柄猶偷安安知我公本不死汝曹有知當骨寒豐碑法書屋漏雨政與丹青照千古天遣神物常守䕶要使亂臣賊子懼祥符陵老許作先馳歸閩因成伽陀贈别紹興甲戌秋七月書於鶴林山無量刼來幾相見莫話南州與北縣居士向來業風吹自合失却本來面今年坐夏在鶴林許我先馳海舟便三山到日已秋深且看山門騎佛殿
